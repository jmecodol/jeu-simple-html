<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ballon Duel</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="back" href="../../index.html">⬅ Menu</a>
      <h1>Ballon Duel</h1>
      <button id="restartBtn" type="button">Rejouer</button>
    </header>

    <main class="stageWrap">
      <canvas id="gameCanvas"></canvas>
      <section id="overlay" class="overlay show">
        <div class="panel">
          <h2>Air Hockey — 2 joueurs</h2>
          <p>
            Joueur 1 à gauche, Joueur 2 à droite.<br />
            Glissez votre doigt pour déplacer votre palet.<br />
            Premier à <strong>7 points</strong> remporte le match !
          </p>
          <button id="startBtn" type="button">Jouer</button>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
