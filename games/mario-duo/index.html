<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mario Duo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="back" href="../../index.html"><- Menu</a>
      <h1>Mario Duo</h1>
      <div class="actions">
        <button id="fullscreenBtn" type="button">Plein ecran</button>
        <button id="restartBtn" type="button">Rejouer</button>
      </div>
    </header>

    <main class="stageWrap">
      <canvas id="gameCanvas"></canvas>

      <section id="overlay" class="overlay">
        <div class="panel">
          <h2>Mario Duo</h2>
          <p>
            Touchez Rejouer pour relancer une partie.
          </p>
          <button id="startBtn" type="button">Jouer</button>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
