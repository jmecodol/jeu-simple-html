<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse City Duel</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="back" href="../../index.html" aria-label="Menu">Menu</a>
      <div class="spacer" aria-hidden="true"></div>
      <button id="fullscreenBtn" type="button" aria-label="Plein ecran">FS</button>
      <button id="restartBtn" type="button" aria-label="Recommencer">Reset</button>
    </header>

    <main class="stageWrap">
      <canvas id="gameCanvas"></canvas>

      <aside class="hudCol leftCol">
        <div class="badge p1" aria-hidden="true"></div>
        <div class="score" id="scoreP1">0</div>
      </aside>

      <aside class="hudCol rightCol">
        <div class="badge p2" aria-hidden="true"></div>
        <div class="score" id="scoreP2">0</div>
      </aside>

      <section id="overlay" class="overlay show">
        <div class="panel">
          <h2 id="panelTitle">Pulse City - Duel de quartiers</h2>
          <p id="panelText">
            Touchez une base, glissez, relachez.
          </p>
          <div class="panelActions">
            <button id="startBtn" type="button">Lancer le district</button>
            <button id="nextBtn" type="button" class="ghost hidden">District suivant</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
