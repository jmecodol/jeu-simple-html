<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guerre Spatiale</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h1>Guerre spatiale</h1>
    <canvas id="gameCanvas"></canvas>
    <button id="replayButton" type="button">Menu principal</button>

    <div id="menuScreen">

      <p>Choisissez votre mode de jeu</p>

      <button class="menuBtn" id="btnCampaign" type="button">🛡️ Campagne — Solo vs Invasion</button>
      <a class="menuBtn" href="../../index.html" style="text-decoration:none;text-align:center;">⬅ Retour à l'accueil</a>
    </div>

    <script>
      if (window.location.protocol === "file:") {
        var legacyScript = document.createElement("script");
        legacyScript.src = "js/main.legacy.js";
        document.body.appendChild(legacyScript);
      } else {
        var moduleScript = document.createElement("script");
        moduleScript.type = "module";
        moduleScript.src = "js/main.js";
        document.body.appendChild(moduleScript);
      }
    </script>
  </body>
