<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeu Simple</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        position: relative;
        background-color: #2b1a0e;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100dvh;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      h1 {
        color: #d4a07a;
        font-size: 1.2rem;
        padding: 8px 16px;
        flex-shrink: 0;
        text-align: center;
      }

      canvas {
        display: block;
        width: 100%;
        flex: 1;
        touch-action: none;
        cursor: crosshair;
      }

      #replayButton {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border: none;
        border-radius: 999px;
        padding: 14px 28px;
        background: #fff2d6;
        color: #4f2b10;
        font-size: 1.05rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        display: none;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <h1>Duel spatial : haut contre bas</h1>
    <canvas id="gameCanvas"></canvas>
    <button id="replayButton" type="button">Rejouer</button>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const replayButton = document.getElementById("replayButton");

      const SHIP_SIZE = 36;
      const BULLET_SPEED = 520;
      const BULLET_RADIUS = 6;
      const SHIP_HIT_RADIUS = 34;
      const FIRE_INTERVAL = 190;
      const MOVE_SPEED = 360;
      const MAX_HEAT = 100;
      const SHOT_HEAT = 18;
      const COOL_RATE = 34;
      const HEAT_RECOVERY_LEVEL = 35;
      const MAX_LOSSES = 5;
      const RESPAWN_DELAY = 1200;
      const TOP_Y_RATIO = 0.14;
      const BOTTOM_Y_RATIO = 0.86;

      const bullets = [];
      const explosions = [];
      const pointerAssignments = new Map();
      const keyState = new Set();

      let players = {};
      let gameOver = false;
      let winnerText = "";
      let lastTime = 0;
      let audioCtx = null;
      let flashTimeout = null;

      const flashOverlay = document.createElement("div");
      flashOverlay.style.cssText =
        "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;z-index:10;";
      document.body.appendChild(flashOverlay);

      function blendColors(hex1, hex2) {
        const r = Math.round((parseInt(hex1.slice(1, 3), 16) + parseInt(hex2.slice(1, 3), 16)) / 2);
        const g = Math.round((parseInt(hex1.slice(3, 5), 16) + parseInt(hex2.slice(3, 5), 16)) / 2);
        const b = Math.round((parseInt(hex1.slice(5, 7), 16) + parseInt(hex2.slice(5, 7), 16)) / 2);
        return `rgb(${r},${g},${b})`;
      }

      function triggerFlash(color1, color2) {
        if (flashTimeout) clearTimeout(flashTimeout);
        flashOverlay.style.backgroundColor = blendColors(color1, color2);
        let count = 0;

        function step() {
          if (count >= 8) {
            flashOverlay.style.opacity = "0";
            flashTimeout = null;
            return;
          }
          flashOverlay.style.opacity = count % 2 === 0 ? "0.65" : "0";
          count++;
          flashTimeout = setTimeout(step, 10);
        }

        step();
      }

      function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }

      function playExplosion() {
        try {
          const ac = getAudioCtx();
          const bufferSize = ac.sampleRate * 0.45;
          const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.15);
          }
          const source = ac.createBufferSource();
          const filter = ac.createBiquadFilter();
          const gain = ac.createGain();
          source.buffer = buffer;
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(900, ac.currentTime);
          filter.frequency.exponentialRampToValueAtTime(70, ac.currentTime + 0.45);
          gain.gain.setValueAtTime(1.5, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.45);
          source.connect(filter);
          filter.connect(gain);
          gain.connect(ac.destination);
          source.start();
        } catch (e) {}
      }

      function playShot() {
        try {
          const ac = getAudioCtx();
          const osc = ac.createOscillator();
          const gain = ac.createGain();
          osc.type = "square";
          osc.frequency.setValueAtTime(1100, ac.currentTime);
          osc.frequency.exponentialRampToValueAtTime(300, ac.currentTime + 0.08);
          gain.gain.setValueAtTime(0.22, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
          osc.connect(gain);
          gain.connect(ac.destination);
          osc.start();
          osc.stop(ac.currentTime + 0.08);
        } catch (e) {}
      }

      function createPlayer(id, name, color, direction, yRatio) {
        return {
          id,
          name,
          color,
          direction,
          yRatio,
          x: canvas.width / 2,
          y: canvas.height * yRatio,
          heat: 0,
          lastFire: 0,
          losses: 0,
          active: true,
          overheated: false,
          respawnAt: 0,
        };
      }

      function createExplosion(x, y, color) {
        const particles = [];
        for (let i = 0; i < 26; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 90 + Math.random() * 250;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            size: 4 + Math.random() * 8,
            color,
          });
        }
        explosions.push({ particles });
      }

      function resetPlayers() {
        players = {
          top: createPlayer("top", "Joueur du haut", "#7bdff2", 1, TOP_Y_RATIO),
          bottom: createPlayer("bottom", "Joueur du bas", "#ff9f68", -1, BOTTOM_Y_RATIO),
        };
      }

      function resetGame() {
        bullets.length = 0;
        explosions.length = 0;
        pointerAssignments.clear();
        keyState.clear();
        gameOver = false;
        winnerText = "";
        lastTime = 0;
        replayButton.style.display = "none";
        resetPlayers();
        resize();
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;

        for (const player of Object.values(players)) {
          player.y = canvas.height * player.yRatio;
          player.x = Math.min(Math.max(player.x, SHIP_SIZE + 12), canvas.width - SHIP_SIZE - 12);
        }
      }

      function movePlayerToX(playerId, clientX) {
        const player = players[playerId];
        if (!player || !player.active || gameOver) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const x = (clientX - rect.left) * scaleX;
        player.x = Math.min(Math.max(x, SHIP_SIZE + 12), canvas.width - SHIP_SIZE - 12);
      }

      function handleKeyboardMovement(player, leftPressed, rightPressed, dt) {
        if (!player.active || gameOver) return;
        const sec = dt / 1000;
        if (leftPressed && !rightPressed) player.x -= MOVE_SPEED * sec;
        if (rightPressed && !leftPressed) player.x += MOVE_SPEED * sec;
        player.x = Math.min(Math.max(player.x, SHIP_SIZE + 12), canvas.width - SHIP_SIZE - 12);
      }

      function fireBullet(player, now) {
        player.lastFire = now;
        bullets.push({
          x: player.x,
          y: player.y + player.direction * SHIP_SIZE,
          vy: player.direction * BULLET_SPEED,
          color: player.color,
          ownerId: player.id,
        });
        player.heat = Math.min(MAX_HEAT, player.heat + SHOT_HEAT);
        if (player.heat >= MAX_HEAT) player.overheated = true;
        playShot();
      }

      function endGame(winnerName) {
        gameOver = true;
        winnerText = `${winnerName} gagne !`;
        replayButton.style.display = "block";
      }

      function destroyPlayer(player, bulletColor, now) {
        player.active = false;
        player.heat = 0;
        player.overheated = false;
        player.losses += 1;
        createExplosion(player.x, player.y, player.color);
        playExplosion();
        triggerFlash(bulletColor, player.color);

        if (player.losses >= MAX_LOSSES) {
          const winnerName = player.id === "top" ? players.bottom.name : players.top.name;
          endGame(winnerName);
          return;
        }

        player.respawnAt = now + RESPAWN_DELAY;
        player.x = canvas.width / 2;
      }

      function update(dt) {
        const now = performance.now();
        const sec = dt / 1000;

        handleKeyboardMovement(
          players.top,
          keyState.has("a") || keyState.has("q"),
          keyState.has("d"),
          dt
        );
        handleKeyboardMovement(
          players.bottom,
          keyState.has("arrowleft"),
          keyState.has("arrowright"),
          dt
        );

        for (const player of Object.values(players)) {
          player.heat = Math.max(0, player.heat - COOL_RATE * sec);

          if (player.overheated && player.heat <= HEAT_RECOVERY_LEVEL) {
            player.overheated = false;
          }

          if (!player.active && !gameOver && now >= player.respawnAt) {
            player.active = true;
            player.lastFire = now;
          }

          if (
            !gameOver &&
            player.active &&
            !player.overheated &&
            now - player.lastFire >= FIRE_INTERVAL
          ) {
            fireBullet(player, now);
          }
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
          const bullet = bullets[i];
          bullet.y += bullet.vy * sec;

          if (bullet.y < -30 || bullet.y > canvas.height + 30) {
            bullets.splice(i, 1);
            continue;
          }

          const target = bullet.ownerId === "top" ? players.bottom : players.top;
          if (!target.active) continue;

          const dx = bullet.x - target.x;
          const dy = bullet.y - target.y;
          if (Math.sqrt(dx * dx + dy * dy) < SHIP_HIT_RADIUS + BULLET_RADIUS) {
            destroyPlayer(target, bullet.color, now);
            bullets.splice(i, 1);
          }
        }

        for (let e = explosions.length - 1; e >= 0; e--) {
          let alive = false;
          for (const p of explosions[e].particles) {
            p.x += p.vx * sec;
            p.y += p.vy * sec;
            p.vy += 180 * sec;
            p.life -= sec * 1.8;
            if (p.life > 0) alive = true;
          }
          if (!alive) explosions.splice(e, 1);
        }
      }

      function drawShip(x, y, color, direction, crossed = false, size = SHIP_SIZE) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, y + direction * size);
        ctx.lineTo(x - size * 0.65, y - direction * size * 0.5);
        ctx.lineTo(x + size * 0.65, y - direction * size * 0.5);
        ctx.closePath();

        const gradient = ctx.createLinearGradient(x, y - size, x, y + size);
        gradient.addColorStop(0, "#ffffff");
        gradient.addColorStop(0.45, color);
        gradient.addColorStop(1, color + "88");
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.lineWidth = crossed ? 1.4 : 2;
        ctx.strokeStyle = "#ffffffcc";
        ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(
          x,
          y - direction * size * 0.5,
          size * 0.22,
          size * 0.12,
          0,
          0,
          Math.PI * 2
        );
        ctx.fillStyle = "#ffffff66";
        ctx.fill();

        if (crossed) {
          ctx.strokeStyle = "#ff4b4b";
          ctx.lineWidth = Math.max(2, size * 0.15);
          ctx.beginPath();
          ctx.moveTo(x - size * 0.9, y - size * 0.9);
          ctx.lineTo(x + size * 0.9, y + size * 0.9);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawHeatBar(player, x, y, width, height) {
        ctx.save();
        ctx.fillStyle = "#00000055";
        ctx.fillRect(x, y, width, height);
        ctx.fillStyle = player.overheated ? "#ff4b4b" : "#ffd166";
        ctx.fillRect(x, y, width * (player.heat / MAX_HEAT), height);
        ctx.strokeStyle = "#ffffff88";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, width, height);
        ctx.fillStyle = "#fff4dd";
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "left";
        ctx.fillText(`${player.name} • chauffe`, x, y - 8);
        ctx.restore();
      }

      function drawLossIcons(player, anchorY) {
        const iconSize = 10;
        const gap = 28;
        const startX = canvas.width - 26;
        for (let i = 0; i < player.losses; i++) {
          const y = anchorY + (player.id === "top" ? i * gap : -i * gap);
          drawShip(startX, y, player.color, player.direction, true, iconSize);
        }
      }

      function drawHud() {
        drawHeatBar(players.top, 18, 24, 180, 14);
        drawHeatBar(players.bottom, 18, canvas.height - 38, 180, 14);
        drawLossIcons(players.top, 36);
        drawLossIcons(players.bottom, canvas.height - 36);

        ctx.save();
        ctx.strokeStyle = "#ffffff22";
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(0, canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.fillStyle = "#f7e4d2";
        ctx.font = "14px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Haut : Q/A/D ou glisser dans la moitié haute", canvas.width / 2, 24);
        ctx.fillText(
          "Bas : flèches ← → ou glisser dans la moitié basse",
          canvas.width / 2,
          canvas.height - 16
        );
        ctx.restore();
      }

      function drawGameOverOverlay() {
        if (!gameOver) return;
        ctx.save();
        ctx.fillStyle = "#00000088";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff2d6";
        ctx.textAlign = "center";
        ctx.font = "bold 34px Arial";
        ctx.fillText("Partie terminée", canvas.width / 2, canvas.height / 2 - 42);
        ctx.font = "bold 26px Arial";
        ctx.fillText(winnerText, canvas.width / 2, canvas.height / 2 - 4);
        ctx.font = "18px Arial";
        ctx.fillText("5 vies perdues : le duel s'arrête.", canvas.width / 2, canvas.height / 2 + 30);
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#2a1308");
        gradient.addColorStop(0.5, "#4b250f");
        gradient.addColorStop(1, "#251106");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ffffff08";
        ctx.fillRect(0, 0, canvas.width, canvas.height / 2);
        ctx.fillStyle = "#00000010";
        ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

        if (players.top.active) {
          drawShip(players.top.x, players.top.y, players.top.color, players.top.direction);
        }

        if (players.bottom.active) {
          drawShip(players.bottom.x, players.bottom.y, players.bottom.color, players.bottom.direction);
        }

        for (const bullet of bullets) {
          ctx.save();
          ctx.beginPath();
          ctx.arc(bullet.x, bullet.y, BULLET_RADIUS, 0, Math.PI * 2);
          ctx.fillStyle = bullet.color;
          ctx.shadowColor = bullet.color;
          ctx.shadowBlur = 14;
          ctx.fill();
          ctx.restore();
        }

        for (const exp of explosions) {
          for (const p of exp.particles) {
            if (p.life <= 0) continue;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.restore();
          }
        }

        drawHud();
        drawGameOverOverlay();
      }

      function gameLoop(timestamp) {
        const dt = lastTime ? Math.min(timestamp - lastTime, 100) : 16;
        lastTime = timestamp;
        update(dt);
        draw();
        requestAnimationFrame(gameLoop);
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        const playerId = e.clientY < window.innerHeight / 2 ? "top" : "bottom";
        pointerAssignments.set(e.pointerId, playerId);
        movePlayerToX(playerId, e.clientX);
        canvas.setPointerCapture(e.pointerId);
      });

      canvas.addEventListener("pointermove", (e) => {
        e.preventDefault();
        const playerId = pointerAssignments.get(e.pointerId);
        if (!playerId) return;
        movePlayerToX(playerId, e.clientX);
      });

      function releasePointer(e) {
        pointerAssignments.delete(e.pointerId);
      }

      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);

      window.addEventListener("keydown", (e) => {
        keyState.add(e.key.toLowerCase());
      });

      window.addEventListener("keyup", (e) => {
        keyState.delete(e.key.toLowerCase());
      });

      replayButton.addEventListener("click", () => {
        resetGame();
      });

      window.addEventListener("resize", resize);

      resetGame();
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
