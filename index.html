<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeu Simple</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        position: relative;
        background-color: #2b1a0e;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100dvh;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      h1 {
        color: #d4a07a;
        font-size: 1.2rem;
        padding: 8px 16px;
        flex-shrink: 0;
        text-align: center;
      }

      canvas {
        display: block;
        width: 100%;
        flex: 1;
        touch-action: none;
        cursor: crosshair;
      }

      #replayButton {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border: none;
        border-radius: 999px;
        padding: 14px 28px;
        background: #fff2d6;
        color: #4f2b10;
        font-size: 1.05rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        display: none;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <h1>Guerre spatiale : haut contre bas</h1>
    <canvas id="gameCanvas"></canvas>
    <button id="replayButton" type="button">Rejouer</button>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const SHIP_SIZE = 36;
      const BASE_BULLET_SPEED = 520;
      const BULLET_RADIUS = 6;
      const SHIP_HIT_RADIUS = 34;
      const BASE_FIRE_INTERVAL = 190;
      const MAX_HEAT = 100;
      const SHOT_HEAT = 18;
      const COOL_RATE = 34;
      const HEAT_RECOVERY_LEVEL = 35;
      const WIN_MILESTONE = 5;
      const LEVELS_TO_WIN = 3;
      const LEVEL_END_DURATION = 2800;
      const TOP_COLOR = "#7bdff2";
      const BOTTOM_COLOR = "#ff9f68";

      // ships: Map<shipId, ship>  — one entry per active finger
      const ships = new Map();
      const bullets = [];
      const explosions = [];
      const pointerToShip = new Map();

      // round kills (progress toward WIN_MILESTONE in the current level)
      let teamWins = { top: 0, bottom: 0 };
      // levels (rounds) won by each team
      let levelWins = { top: 0, bottom: 0 };
      let currentLevel = 1;
      // 'playing' | 'levelEnd' | 'matchEnd'
      let gamePhase = "playing";
      let levelEndWinner = null;
      let levelEndTimer = 0;

      let lastTime = 0;
      let audioCtx = null;
      let flashTimeout = null;
      let audioUnlocked = false;

      const flashOverlay = document.createElement("div");
      flashOverlay.style.cssText =
        "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;z-index:10;";
      document.body.appendChild(flashOverlay);

      function blendColors(hex1, hex2) {
        const r = Math.round((parseInt(hex1.slice(1, 3), 16) + parseInt(hex2.slice(1, 3), 16)) / 2);
        const g = Math.round((parseInt(hex1.slice(3, 5), 16) + parseInt(hex2.slice(3, 5), 16)) / 2);
        const b = Math.round((parseInt(hex1.slice(5, 7), 16) + parseInt(hex2.slice(5, 7), 16)) / 2);
        return `rgb(${r},${g},${b})`;
      }

      function triggerFlash(color1, color2) {
        if (flashTimeout) clearTimeout(flashTimeout);
        flashOverlay.style.backgroundColor = blendColors(color1, color2);
        let count = 0;

        function step() {
          if (count >= 8) {
            flashOverlay.style.opacity = "0";
            flashTimeout = null;
            return;
          }
          flashOverlay.style.opacity = count % 2 === 0 ? "0.65" : "0";
          count++;
          flashTimeout = setTimeout(step, 10);
        }

        step();
      }

      function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }

      function unlockAudio() {
        audioUnlocked = true;
        if (audioCtx && audioCtx.state === "suspended") {
          audioCtx.resume().catch(() => {});
        }
      }

      function getBulletSpeed() {
        return BASE_BULLET_SPEED + (currentLevel - 1) * 40;
      }

      function getFireInterval() {
        return Math.max(80, BASE_FIRE_INTERVAL - (currentLevel - 1) * 15);
      }

      function playExplosion() {
        if (!audioUnlocked) return;
        try {
          const ac = getAudioCtx();
          const bufferSize = ac.sampleRate * 0.45;
          const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.15);
          }
          const source = ac.createBufferSource();
          const filter = ac.createBiquadFilter();
          const gain = ac.createGain();
          source.buffer = buffer;
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(900, ac.currentTime);
          filter.frequency.exponentialRampToValueAtTime(70, ac.currentTime + 0.45);
          gain.gain.setValueAtTime(1.5, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.45);
          source.connect(filter);
          filter.connect(gain);
          gain.connect(ac.destination);
          source.start();
        } catch (e) {}
      }

      function playShot() {
        if (!audioUnlocked) return;
        try {
          const ac = getAudioCtx();
          const osc = ac.createOscillator();
          const gain = ac.createGain();
          osc.type = "square";
          osc.frequency.setValueAtTime(1100, ac.currentTime);
          osc.frequency.exponentialRampToValueAtTime(300, ac.currentTime + 0.08);
          gain.gain.setValueAtTime(0.22, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
          osc.connect(gain);
          gain.connect(ac.destination);
          osc.start();
          osc.stop(ac.currentTime + 0.08);
        } catch (e) {}
      }

      // Vertical direction each team's ship faces: top points down (+1), bottom points up (-1)
      function teamDir(team) {
        return team === "top" ? 1 : -1;
      }

      function clampX(x) {
        return Math.min(Math.max(x, SHIP_SIZE + 12), canvas.width - SHIP_SIZE - 12);
      }

      function clampY(y) {
        return Math.min(Math.max(y, SHIP_SIZE + 12), canvas.height - SHIP_SIZE - 12);
      }

      function createShip(id, team, x, y) {
        return {
          id,
          team,
          color: team === "top" ? TOP_COLOR : BOTTOM_COLOR,
          x: clampX(x),
          y: clampY(y),
          heat: 0,
          lastFire: 0,
          active: true,
          overheated: false,
        };
      }

      function createExplosion(x, y, color) {
        const particles = [];
        for (let i = 0; i < 26; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 90 + Math.random() * 250;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            size: 4 + Math.random() * 8,
            color,
          });
        }
        explosions.push({ particles });
      }

      function resetGame() {
        bullets.length = 0;
        explosions.length = 0;
        ships.clear();
        pointerToShip.clear();
        teamWins = { top: 0, bottom: 0 };
        levelWins = { top: 0, bottom: 0 };
        currentLevel = 1;
        gamePhase = "playing";
        levelEndWinner = null;
        levelEndTimer = 0;
        lastTime = 0;
        document.getElementById("replayButton").style.display = "none";
        resize();
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        for (const ship of ships.values()) {
          ship.x = clampX(ship.x);
          ship.y = clampY(ship.y);
        }
      }

      function destroyShip(ship, bulletColor) {
        createExplosion(ship.x, ship.y, ship.color);
        playExplosion();
        triggerFlash(bulletColor, ship.color);

        const winningTeam = ship.team === "top" ? "bottom" : "top";
        teamWins[winningTeam] += 1;

        // Remove ship immediately
        ships.delete(ship.id);
        for (const [ptId, shipId] of pointerToShip.entries()) {
          if (shipId === ship.id) {
            pointerToShip.delete(ptId);
            break;
          }
        }

        // Check level win
        if (teamWins[winningTeam] >= WIN_MILESTONE && gamePhase === "playing") {
          levelWins[winningTeam] += 1;
          levelEndWinner = winningTeam;
          if (levelWins[winningTeam] >= LEVELS_TO_WIN) {
            gamePhase = "matchEnd";
            document.getElementById("replayButton").style.display = "block";
          } else {
            gamePhase = "levelEnd";
            levelEndTimer = LEVEL_END_DURATION;
          }
        }
      }

      function startNextLevel() {
        currentLevel += 1;
        teamWins = { top: 0, bottom: 0 };
        bullets.length = 0;
        explosions.length = 0;
        ships.clear();
        pointerToShip.clear();
        lastTime = 0;
        gamePhase = "playing";
        levelEndWinner = null;
      }

      function fireBullet(ship, now) {
        ship.lastFire = now;

        // Default direction: straight toward the enemy half
        let vx = 0;
        let vy = teamDir(ship.team) * getBulletSpeed();

        // Aim at the nearest active enemy ship instead
        let minDist = Infinity;
        for (const other of ships.values()) {
          if (other.team === ship.team || !other.active) continue;
          const dx = other.x - ship.x;
          const dy = other.y - ship.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < minDist) {
            minDist = dist;
            const len = dist || 1;
            vx = (dx / len) * getBulletSpeed();
            vy = (dy / len) * getBulletSpeed();
          }
        }

        bullets.push({
          x: ship.x,
          y: ship.y,
          vx,
          vy,
          color: ship.color,
          ownerTeam: ship.team,
        });

        ship.heat = Math.min(MAX_HEAT, ship.heat + SHOT_HEAT);
        if (ship.heat >= MAX_HEAT) ship.overheated = true;
        playShot();
      }

      function update(dt) {
        if (gamePhase === "levelEnd") {
          levelEndTimer -= dt;
          if (levelEndTimer <= 0) startNextLevel();
          return;
        }
        if (gamePhase === "matchEnd") return;

        const now = performance.now();
        const sec = dt / 1000;

        for (const ship of ships.values()) {
          ship.heat = Math.max(0, ship.heat - COOL_RATE * sec);
          if (ship.overheated && ship.heat <= HEAT_RECOVERY_LEVEL) ship.overheated = false;

          if (ship.active && !ship.overheated && now - ship.lastFire >= getFireInterval()) {
            fireBullet(ship, now);
          }
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
          const bullet = bullets[i];
          bullet.x += bullet.vx * sec;
          bullet.y += bullet.vy * sec;

          if (
            bullet.x < -50 ||
            bullet.x > canvas.width + 50 ||
            bullet.y < -50 ||
            bullet.y > canvas.height + 50
          ) {
            bullets.splice(i, 1);
            continue;
          }

          let hit = false;
          for (const ship of ships.values()) {
            if (ship.team === bullet.ownerTeam || !ship.active) continue;
            const dx = bullet.x - ship.x;
            const dy = bullet.y - ship.y;
            if (Math.sqrt(dx * dx + dy * dy) < SHIP_HIT_RADIUS + BULLET_RADIUS) {
              destroyShip(ship, bullet.color);
              bullets.splice(i, 1);
              hit = true;
              break;
            }
          }
          if (hit) continue;
        }

        for (let e = explosions.length - 1; e >= 0; e--) {
          let alive = false;
          for (const p of explosions[e].particles) {
            p.x += p.vx * sec;
            p.y += p.vy * sec;
            p.vy += 180 * sec;
            p.life -= sec * 1.8;
            if (p.life > 0) alive = true;
          }
          if (!alive) explosions.splice(e, 1);
        }
      }

      function drawShip(x, y, color, direction, crossed = false, size = SHIP_SIZE) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, y + direction * size);
        ctx.lineTo(x - size * 0.65, y - direction * size * 0.5);
        ctx.lineTo(x + size * 0.65, y - direction * size * 0.5);
        ctx.closePath();

        const gradient = ctx.createLinearGradient(x, y - size, x, y + size);
        gradient.addColorStop(0, "#ffffff");
        gradient.addColorStop(0.45, color);
        gradient.addColorStop(1, color + "88");
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.lineWidth = crossed ? 1.4 : 2;
        ctx.strokeStyle = "#ffffffcc";
        ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(
          x,
          y - direction * size * 0.5,
          size * 0.22,
          size * 0.12,
          0,
          0,
          Math.PI * 2
        );
        ctx.fillStyle = "#ffffff66";
        ctx.fill();

        if (crossed) {
          ctx.strokeStyle = "#ff4b4b";
          ctx.lineWidth = Math.max(2, size * 0.15);
          ctx.beginPath();
          ctx.moveTo(x - size * 0.9, y - size * 0.9);
          ctx.lineTo(x + size * 0.9, y + size * 0.9);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawWinBar(team, labelY, barY) {
        const wins = teamWins[team];
        const lvWins = levelWins[team];
        const color = team === "top" ? TOP_COLOR : BOTTOM_COLOR;
        const progress = wins % WIN_MILESTONE;
        const barW = 120;
        const barH = 7;
        const x = 18;

        ctx.save();

        // Level wins as filled circles
        for (let m = 0; m < LEVELS_TO_WIN; m++) {
          ctx.beginPath();
          ctx.arc(x + m * 20 + 7, labelY - 10, 6, 0, Math.PI * 2);
          ctx.fillStyle = m < lvWins ? color : "#ffffff22";
          ctx.fill();
        }

        // Text: kills this round
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "left";
        ctx.fillStyle = color;
        ctx.fillText(
          `Équipe ${team === "top" ? "haut" : "bas"} — victoires : ${wins}`,
          x + LEVELS_TO_WIN * 20 + 4,
          labelY
        );

        // Progress bar background
        ctx.fillStyle = "#ffffff22";
        ctx.fillRect(x, barY, barW, barH);

        // Progress bar fill
        ctx.fillStyle = color;
        ctx.fillRect(x, barY, (progress / WIN_MILESTONE) * barW, barH);

        // Divider ticks
        ctx.fillStyle = "#000000aa";
        for (let i = 1; i < WIN_MILESTONE; i++) {
          ctx.fillRect(x + (i / WIN_MILESTONE) * barW - 1, barY, 2, barH);
        }

        ctx.restore();
      }

      function drawLevelEnd() {
        const winColor = levelEndWinner === "top" ? TOP_COLOR : BOTTOM_COLOR;
        const winLabel = levelEndWinner === "top" ? "HAUT" : "BAS";
        const progress = Math.max(0, 1 - levelEndTimer / LEVEL_END_DURATION);

        ctx.save();
        ctx.globalAlpha = Math.min(1, progress * 4);

        // Dark overlay
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        // Level win announcement
        ctx.textAlign = "center";
        ctx.shadowColor = winColor;
        ctx.shadowBlur = 28;
        ctx.fillStyle = winColor;
        ctx.font = "bold 38px Arial";
        ctx.fillText(`ÉQUIPE ${winLabel} GAGNE !`, cx, cy - 28);

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 22px Arial";
        ctx.shadowBlur = 12;
        ctx.fillText(`Niveau ${currentLevel} terminé`, cx, cy + 12);

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#f7e4d2cc";
        ctx.font = "16px Arial";
        ctx.fillText(`Niveau ${currentLevel + 1} dans…`, cx, cy + 46);

        // Countdown bar
        const barW = 200;
        const barH = 8;
        const barX = cx - barW / 2;
        const barY = cy + 60;
        ctx.fillStyle = "#ffffff22";
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = winColor;
        ctx.fillRect(barX, barY, barW * (1 - levelEndTimer / LEVEL_END_DURATION), barH);

        // Level wins summary
        ctx.shadowBlur = 0;
        ctx.font = "bold 15px Arial";
        ctx.fillStyle = TOP_COLOR;
        ctx.fillText(`Haut : ${levelWins.top} niveau(x)`, cx - 80, cy + 95);
        ctx.fillStyle = BOTTOM_COLOR;
        ctx.fillText(`Bas : ${levelWins.bottom} niveau(x)`, cx + 80, cy + 95);

        ctx.restore();
      }

      function drawMatchEnd() {
        const winColor = levelEndWinner === "top" ? TOP_COLOR : BOTTOM_COLOR;
        const winLabel = levelEndWinner === "top" ? "HAUT" : "BAS";

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2 - 40;

        ctx.textAlign = "center";
        ctx.shadowColor = winColor;
        ctx.shadowBlur = 36;
        ctx.fillStyle = winColor;
        ctx.font = "bold 44px Arial";
        ctx.fillText(`VICTOIRE — ÉQUIPE ${winLabel}`, cx, cy);

        ctx.shadowBlur = 14;
        ctx.fillStyle = "#fff2d6";
        ctx.font = "bold 22px Arial";
        ctx.fillText(`${LEVELS_TO_WIN} niveaux remportés !`, cx, cy + 44);

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#f7e4d2aa";
        ctx.font = "16px Arial";
        ctx.fillText(`Haut : ${levelWins.top} · Bas : ${levelWins.bottom}`, cx, cy + 78);

        ctx.restore();
      }

      function drawHud() {
        drawWinBar("top", 24, 30);
        drawWinBar("bottom", canvas.height - 14, canvas.height - 22);

        // Current level indicator
        ctx.save();
        ctx.textAlign = "right";
        ctx.fillStyle = "#f7e4d2cc";
        ctx.font = "bold 14px Arial";
        ctx.fillText(`Niveau ${currentLevel}`, canvas.width - 18, 24);
        ctx.restore();

        // Center dividing line (decorative — ships may cross it freely)
        ctx.save();
        ctx.strokeStyle = "#ffffff22";
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(0, canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();
        ctx.restore();

        // Instructions near the center line
        ctx.save();
        ctx.fillStyle = "#f7e4d288";
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(
          "Toucher l'écran pour invoquer des vaisseaux — haut contre bas",
          canvas.width / 2,
          canvas.height / 2 + 18
        );
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#2a1308");
        gradient.addColorStop(0.5, "#4b250f");
        gradient.addColorStop(1, "#251106");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ffffff08";
        ctx.fillRect(0, 0, canvas.width, canvas.height / 2);
        ctx.fillStyle = "#00000010";
        ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

        for (const ship of ships.values()) {
          if (!ship.active) continue;
          ctx.save();
          if (ship.overheated) ctx.globalAlpha = 0.45;
          drawShip(ship.x, ship.y, ship.color, teamDir(ship.team));
          ctx.restore();
        }

        for (const bullet of bullets) {
          ctx.save();
          ctx.beginPath();
          ctx.arc(bullet.x, bullet.y, BULLET_RADIUS, 0, Math.PI * 2);
          ctx.fillStyle = bullet.color;
          ctx.shadowColor = bullet.color;
          ctx.shadowBlur = 14;
          ctx.fill();
          ctx.restore();
        }

        for (const exp of explosions) {
          for (const p of exp.particles) {
            if (p.life <= 0) continue;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.restore();
          }
        }

        drawHud();

        if (gamePhase === "levelEnd") drawLevelEnd();
        if (gamePhase === "matchEnd") drawMatchEnd();
      }

      function gameLoop(timestamp) {
        const dt = lastTime ? Math.min(timestamp - lastTime, 100) : 16;
        lastTime = timestamp;
        update(dt);
        draw();
        requestAnimationFrame(gameLoop);
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        unlockAudio();
        if (gamePhase !== "playing") return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        // Assign team based on where the finger first touches
        const team = y < canvas.height / 2 ? "top" : "bottom";
        const shipId = `touch_${e.pointerId}`;
        if (ships.has(shipId)) return;
        const ship = createShip(shipId, team, x, y);
        ship.lastFire = performance.now();
        ships.set(shipId, ship);
        pointerToShip.set(e.pointerId, shipId);
        canvas.setPointerCapture(e.pointerId);
      });

      canvas.addEventListener("pointermove", (e) => {
        e.preventDefault();
        const shipId = pointerToShip.get(e.pointerId);
        if (!shipId) return;
        const ship = ships.get(shipId);
        if (!ship) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        ship.x = clampX(x);
        ship.y = clampY(y);
      });

      function releasePointer(e) {
        const shipId = pointerToShip.get(e.pointerId);
        if (shipId) {
          ships.delete(shipId);
          pointerToShip.delete(e.pointerId);
        }
      }

      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);

      window.addEventListener("resize", resize);

      document.getElementById("replayButton").addEventListener("click", () => {
        resetGame();
      });

      resetGame();
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
