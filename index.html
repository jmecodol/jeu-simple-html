<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeu Simple</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #2b1a0e;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100dvh;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
      h1 {
        color: #d4a07a;
        font-size: 1.2rem;
        padding: 8px 16px;
        flex-shrink: 0;
      }
      canvas {
        display: block;
        width: 100%;
        flex: 1;
        touch-action: none;
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <h1>Jeu Simple</h1>
    <canvas id="gameCanvas"></canvas>
    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const pastelColors = [
        "#FFB3C6", "#FFD6E0", "#FFC8A2", "#FFE0B2",
        "#D4F1C4", "#B5EAD7", "#C7CEEA", "#E2CCFF",
        "#FFDAC1", "#FF9AA2", "#B5D5F5", "#FFEAA7",
      ];

      // Active spaceships keyed by pointer/touch identifier
      const ships = new Map();

      // Bullets in flight: [{x, y, vy, color, ownerId}]
      const bullets = [];

      // Explosion particle effects: [{particles: [{x,y,vx,vy,life,size,color}]}]
      const explosions = [];

      const SHIP_SIZE = 40;       // half-height of triangle
      const BULLET_SPEED = 500;   // px/s upward
      const BULLET_RADIUS = 6;
      const FIRE_INTERVAL = 180;  // ms between shots
      const SHIP_HIT_RADIUS = 36; // radius for collision detection

      // Track pairs currently touching (to fire thunder only on new contact)
      const touchingPairs = new Set();

      // --- Flash overlay for epileptic background effect on thunder ---
      const flashOverlay = document.createElement("div");
      flashOverlay.style.cssText =
        "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;z-index:10;";
      document.body.appendChild(flashOverlay);

      function blendColors(hex1, hex2) {
        const r = Math.round((parseInt(hex1.slice(1, 3), 16) + parseInt(hex2.slice(1, 3), 16)) / 2);
        const g = Math.round((parseInt(hex1.slice(3, 5), 16) + parseInt(hex2.slice(3, 5), 16)) / 2);
        const b = Math.round((parseInt(hex1.slice(5, 7), 16) + parseInt(hex2.slice(5, 7), 16)) / 2);
        return `rgb(${r},${g},${b})`;
      }

      let flashTimeout = null;

      function triggerFlash(color1, color2) {
        if (flashTimeout) clearTimeout(flashTimeout);
        flashOverlay.style.backgroundColor = blendColors(color1, color2);
        let count = 0;
        const totalFlashes = 4;   // 4 bright flashes
        const halfInterval = 6;   // 6 ms per half-cycle → 8 × 6 ms ≈ 48 ms total

        function step() {
          if (count >= totalFlashes * 2) {
            flashOverlay.style.opacity = "0";
            flashTimeout = null;
            return;
          }
          flashOverlay.style.opacity = count % 2 === 0 ? "0.9" : "0";
          count++;
          flashTimeout = setTimeout(step, halfInterval);
        }
        step();
      }

      // --- Thunder sound via Web Audio API ---
      let audioCtx = null;
      function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }

      function playThunder() {
        try {
          const ac = getAudioCtx();
          const bufferSize = ac.sampleRate * 1.5;
          const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
          const data = buffer.getChannelData(0);
          // White noise shaped into a thunder rumble
          for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 0.4);
          }
          const source = ac.createBufferSource();
          source.buffer = buffer;

          // Low-pass filter for rumble
          const filter = ac.createBiquadFilter();
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(300, ac.currentTime);
          filter.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 1.5);

          const gain = ac.createGain();
          gain.gain.setValueAtTime(1.2, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 1.5);

          source.connect(filter);
          filter.connect(gain);
          gain.connect(ac.destination);
          source.start();
        } catch (e) {
          // AudioContext unavailable – silently skip
        }
      }

      function playExplosion() {
        try {
          const ac = getAudioCtx();
          const bufferSize = ac.sampleRate * 0.5;
          const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.2);
          }
          const source = ac.createBufferSource();
          source.buffer = buffer;
          const filter = ac.createBiquadFilter();
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(900, ac.currentTime);
          filter.frequency.exponentialRampToValueAtTime(60, ac.currentTime + 0.5);
          const gain = ac.createGain();
          gain.gain.setValueAtTime(1.8, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.5);
          source.connect(filter);
          filter.connect(gain);
          gain.connect(ac.destination);
          source.start();
        } catch (e) {}
      }

      function playShot() {
        try {
          const ac = getAudioCtx();
          const osc = ac.createOscillator();
          const gain = ac.createGain();
          osc.type = "square";
          osc.frequency.setValueAtTime(1200, ac.currentTime);
          osc.frequency.exponentialRampToValueAtTime(300, ac.currentTime + 0.09);
          gain.gain.setValueAtTime(0.25, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.09);
          osc.connect(gain);
          gain.connect(ac.destination);
          osc.start();
          osc.stop(ac.currentTime + 0.09);
        } catch (e) {}
      }

      // Draw a jagged lightning bolt between two points
      function drawLightning(x1, y1, x2, y2) {
        const segments = 8;
        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.sqrt(dx * dx + dy * dy);
        const nx = -dy / len; // normal direction
        const ny = dx / len;
        const jitter = len * 0.18;

        const pts = [{ x: x1, y: y1 }];
        for (let i = 1; i < segments; i++) {
          const t = i / segments;
          const offset = (Math.random() - 0.5) * 2 * jitter;
          pts.push({
            x: x1 + dx * t + nx * offset,
            y: y1 + dy * t + ny * offset,
          });
        }
        pts.push({ x: x2, y: y2 });

        // Glow layer
        ctx.save();
        ctx.shadowColor = "#ffffaa";
        ctx.shadowBlur = 18;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 3;
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();

        // Core bright line
        ctx.shadowBlur = 6;
        ctx.strokeStyle = "#ffe94d";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();
        ctx.restore();
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
      }

      function pickColor(id) {
        return pastelColors[Math.abs(id) % pastelColors.length];
      }

      function createExplosion(x, y, color) {
        const particles = [];
        for (let i = 0; i < 28; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 80 + Math.random() * 260;
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            size: 4 + Math.random() * 9,
            color,
          });
        }
        explosions.push({ particles });
      }

      function update(dt) {
        const sec = dt / 1000;
        const now = performance.now();

        // Fire bullets from each active ship
        for (const [id, ship] of ships) {
          if (now - ship.lastFire >= FIRE_INTERVAL) {
            ship.lastFire = now;
            bullets.push({
              x: ship.x,
              y: ship.y - SHIP_SIZE,
              vy: -BULLET_SPEED,
              color: ship.color,
              ownerId: id,
            });
            playShot();
          }
        }

        // Move bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
          bullets[i].y += bullets[i].vy * sec;
          if (bullets[i].y < -30) bullets.splice(i, 1);
        }

        // Bullet vs ship collision
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          let hit = false;
          for (const [id, ship] of ships) {
            if (id === b.ownerId) continue;
            const dx = b.x - ship.x;
            const dy = b.y - ship.y;
            if (Math.sqrt(dx * dx + dy * dy) < SHIP_HIT_RADIUS + BULLET_RADIUS) {
              createExplosion(ship.x, ship.y, ship.color);
              playExplosion();
              triggerFlash(b.color, ship.color);
              ships.delete(id);
              hit = true;
              break;
            }
          }
          if (hit) bullets.splice(i, 1);
        }

        // Update explosion particles
        for (let e = explosions.length - 1; e >= 0; e--) {
          let alive = false;
          for (const p of explosions[e].particles) {
            p.x += p.vx * sec;
            p.y += p.vy * sec;
            p.vy += 180 * sec; // gravity
            p.life -= sec * 1.8;
            if (p.life > 0) alive = true;
          }
          if (!alive) explosions.splice(e, 1);
        }
      }

      function drawShip(ship) {
        const { x, y, color } = ship;
        const s = SHIP_SIZE;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, y - s);                   // tip (pointing up)
        ctx.lineTo(x - s * 0.65, y + s * 0.5);  // bottom-left
        ctx.lineTo(x + s * 0.65, y + s * 0.5);  // bottom-right
        ctx.closePath();
        const gradient = ctx.createLinearGradient(x, y - s, x, y + s * 0.5);
        gradient.addColorStop(0, "#ffffff");
        gradient.addColorStop(0.4, color);
        gradient.addColorStop(1, color + "88");
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.strokeStyle = "#ffffffaa";
        ctx.lineWidth = 2;
        ctx.stroke();
        // Engine glow
        ctx.beginPath();
        ctx.ellipse(x, y + s * 0.5, s * 0.22, s * 0.12, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#ffffff66";
        ctx.fill();
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Dark brown background
        ctx.fillStyle = "#3b1f0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Ship-ship collision & lightning
        const ids = [...ships.keys()];
        const nowTouching = new Set();
        for (let i = 0; i < ids.length; i++) {
          for (let j = i + 1; j < ids.length; j++) {
            const a = ships.get(ids[i]);
            const b = ships.get(ids[j]);
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist <= SHIP_HIT_RADIUS * 2) {
              const pairKey = ids[i] + ":" + ids[j];
              nowTouching.add(pairKey);
              if (!touchingPairs.has(pairKey)) {
                playThunder();
                triggerFlash(a.color, b.color);
              }
              drawLightning(a.x, a.y, b.x, b.y);
            }
          }
        }
        touchingPairs.clear();
        for (const k of nowTouching) touchingPairs.add(k);

        // Draw ships
        for (const ship of ships.values()) drawShip(ship);

        // Draw bullets
        for (const b of bullets) {
          ctx.save();
          ctx.beginPath();
          ctx.arc(b.x, b.y, BULLET_RADIUS, 0, Math.PI * 2);
          ctx.fillStyle = b.color;
          ctx.shadowColor = b.color;
          ctx.shadowBlur = 14;
          ctx.fill();
          ctx.restore();
        }

        // Draw explosion particles
        for (const exp of explosions) {
          for (const p of exp.particles) {
            if (p.life <= 0) continue;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.restore();
          }
        }
      }

      // --- Game Loop ---
      let lastTime = 0;
      function gameLoop(timestamp) {
        const dt = Math.min(timestamp - lastTime, 100);
        lastTime = timestamp;
        update(dt);
        draw();
        requestAnimationFrame(gameLoop);
      }
      requestAnimationFrame(gameLoop);

      // --- Pointer Events (covers mouse + touch on modern browsers) ---
      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        ships.set(e.pointerId, {
          x: (e.clientX - rect.left) * scaleX,
          y: (e.clientY - rect.top) * scaleY,
          color: pickColor(e.pointerId),
          lastFire: 0,
        });
        canvas.setPointerCapture(e.pointerId);
      });

      canvas.addEventListener("pointermove", (e) => {
        e.preventDefault();
        if (!ships.has(e.pointerId)) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const ship = ships.get(e.pointerId);
        ship.x = (e.clientX - rect.left) * scaleX;
        ship.y = (e.clientY - rect.top) * scaleY;
      });

      canvas.addEventListener("pointerup", (e) => {
        e.preventDefault();
        ships.delete(e.pointerId);
      });

      canvas.addEventListener("pointercancel", (e) => {
        ships.delete(e.pointerId);
      });

      window.addEventListener("resize", resize);
      resize();
    </script>
  </body>
</html>
