<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeu Simple</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        position: relative;
        background-color: #2b1a0e;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100dvh;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      h1 {
        color: #d4a07a;
        font-size: 1.2rem;
        padding: 8px 16px;
        flex-shrink: 0;
        text-align: center;
      }

      canvas {
        display: block;
        width: 100%;
        flex: 1;
        touch-action: none;
        cursor: crosshair;
      }

      #replayButton {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border: none;
        border-radius: 999px;
        padding: 14px 28px;
        background: #fff2d6;
        color: #4f2b10;
        font-size: 1.05rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        display: none;
        z-index: 20;
      }

      #menuScreen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(18, 8, 2, 0.93);
        z-index: 30;
        gap: 20px;
        padding: 24px;
      }

      #menuScreen h2 {
        color: #d4a07a;
        font-size: clamp(1.4rem, 5vw, 2.2rem);
        text-align: center;
        text-shadow: 0 0 28px #ff9f6888;
      }

      #menuScreen p {
        color: #f7e4d2aa;
        font-size: clamp(0.85rem, 3vw, 1rem);
        text-align: center;
      }

      .menuBtn {
        border: none;
        border-radius: 999px;
        padding: 14px 32px;
        background: #fff2d6;
        color: #4f2b10;
        font-size: clamp(0.9rem, 3vw, 1.1rem);
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        transition: transform 0.12s, box-shadow 0.12s;
        max-width: 340px;
        width: 100%;
      }

      .menuBtn:hover,
      .menuBtn:active {
        transform: scale(1.04);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
      }
    </style>
  </head>
  <body>
    <h1>Guerre spatiale</h1>
    <canvas id="gameCanvas"></canvas>
    <button id="replayButton" type="button">Menu principal</button>

    <div id="menuScreen">
      <h2>🚀 Guerre Spatiale</h2>
      <p>Choisissez votre mode de jeu</p>
      <button class="menuBtn" id="btnPvp" type="button">⚔️ Duel — Haut contre Bas</button>
      <button class="menuBtn" id="btnCoop" type="button">🤝 Équipe — 2 joueurs vs Ennemis</button>
    </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const SHIP_SIZE = 36;
      const BASE_BULLET_SPEED = 520;
      const BULLET_RADIUS = 6;
      const SHIP_HIT_RADIUS = 34;
      const BASE_FIRE_INTERVAL = 190;
      const MAX_HEAT = 100;
      const SHOT_HEAT = 18;
      const COOL_RATE = 34;
      const HEAT_RECOVERY_LEVEL = 35;
      const WIN_MILESTONE = 10;
      const LEVELS_TO_WIN = 3;
      const LEVEL_END_DURATION = 2800;
      const TOP_COLOR = "#7bdff2";
      const BOTTOM_COLOR = "#ff9f68";

      // Coop mode constants
      const COOP_ENEMY_COLOR = "#ff4455";
      const COOP_WAVES_TO_WIN = 5;
      const COOP_WAVE_END_DURATION = 3000;
      const COOP_ENEMY_SPAWN_INTERVAL = 900;
      const COOP_ENEMY_BASE_MOVE_SPEED = 75;
      const COOP_ENEMY_FIRE_RATE_MULTIPLIER = 0.55;
      const COOP_ENEMY_BASE_HP = 6;
      const COOP_ENEMY_HP_PER_WAVE = 2;
      const COOP_MAX_PLAYER_DEATHS = 10;

      // Bonus system
      const BONUS_PILL_RADIUS = 14;
      const BONUS_PILL_SPEED = 65;
      const BONUS_PILL_LIFE = 9000;
      const BONUS_EFFECT_DURATION = 6000;
      const MAX_BONUS_PILLS = 3;
      const BONUS_SPAWN_INTERVAL = 5500;
      const BONUS_TYPES = ["laser", "ring", "rapid", "triple", "shield", "scatter", "sniper", "bounce", "mega", "ghost", "homing", "burst", "piercing", "stealth", "nova", "quake", "drill"];
      const BONUS_COLORS = {
        laser: "#00eeff",
        ring: "#cc44ff",
        rapid: "#ffdd00",
        triple: "#44ff88",
        shield: "#4499ff",
        scatter: "#ff6644",
        sniper: "#e0e0ff",
        bounce: "#88ffcc",
        mega: "#ff22aa",
        ghost: "#bb88ff",
        homing: "#ffaa00",
        burst: "#ff44ff",
        piercing: "#00ffaa",
        stealth: "#8899aa",
        nova: "#ff8800",
        quake: "#ff5566",
        drill: "#66ffee",
      };
      const BONUS_ICONS = {
        laser: "⚡",
        ring: "◎",
        rapid: "»",
        triple: "≡",
        shield: "⬡",
        scatter: "✦",
        sniper: "◈",
        bounce: "↻",
        mega: "◉",
        ghost: "○",
        homing: "⊛",
        burst: "⁂",
        piercing: "⇓",
        stealth: "◌",
        nova: "✸",
        quake: "✹",
        drill: "⬢",
      };

      // ships: Map<shipId, ship>  — one entry per active finger
      const ships = new Map();
      const bullets = [];
      const explosions = [];
      const bonusPills = [];
      let bonusSpawnTimer = BONUS_SPAWN_INTERVAL;
      const pointerToShip = new Map();

      // Game mode: null = menu, "pvp" = duel, "coop" = team vs enemies
      let gameMode = null;

      // PvP state
      let teamWins = { top: 0, bottom: 0 };
      let levelWins = { top: 0, bottom: 0 };
      let currentLevel = 1;
      // 'playing' | 'levelEnd' | 'matchEnd'
      let gamePhase = "playing";
      let levelEndWinner = null;
      let levelEndTimer = 0;

      // Coop state
      let coopWave = 0;
      let coopKills = 0;
      let coopPlayerDeaths = 0;
      let coopVictory = false;
      let coopWavePhase = "playing"; // 'playing' | 'waveEnd' | 'matchEnd'
      let coopWaveEndTimer = 0;
      let coopEnemySpawnList = [];
      let coopEnemySpawnTimer = 0;
      let coopEnemyIdCounter = 0;

      let lastTime = 0;
      let audioCtx = null;
      let flashTimeout = null;
      let audioUnlocked = false;

      const flashOverlay = document.createElement("div");
      flashOverlay.style.cssText =
        "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;z-index:10;";
      document.body.appendChild(flashOverlay);

      function blendColors(hex1, hex2) {
        const r = Math.round((parseInt(hex1.slice(1, 3), 16) + parseInt(hex2.slice(1, 3), 16)) / 2);
        const g = Math.round((parseInt(hex1.slice(3, 5), 16) + parseInt(hex2.slice(3, 5), 16)) / 2);
        const b = Math.round((parseInt(hex1.slice(5, 7), 16) + parseInt(hex2.slice(5, 7), 16)) / 2);
        return `rgb(${r},${g},${b})`;
      }

      function triggerFlash(color1, color2) {
        if (flashTimeout) clearTimeout(flashTimeout);
        flashOverlay.style.backgroundColor = blendColors(color1, color2);
        let count = 0;

        function step() {
          if (count >= 8) {
            flashOverlay.style.opacity = "0";
            flashTimeout = null;
            return;
          }
          flashOverlay.style.opacity = count % 2 === 0 ? "0.65" : "0";
          count++;
          flashTimeout = setTimeout(step, 10);
        }

        step();
      }

      function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }

      function unlockAudio() {
        audioUnlocked = true;
        if (audioCtx && audioCtx.state === "suspended") {
          audioCtx.resume().catch(() => {});
        }
      }

      function getBulletSpeed() {
        return BASE_BULLET_SPEED + (currentLevel - 1) * 40;
      }

      function getFireInterval() {
        return Math.max(80, BASE_FIRE_INTERVAL - (currentLevel - 1) * 15);
      }

      function getShipFireInterval(ship) {
        const base = getFireInterval();
        if (ship.team === "enemy") return Math.max(60, base * COOP_ENEMY_FIRE_RATE_MULTIPLIER);
        return ship.bonusType === "rapid" ? base * 0.42 : base;
      }

      function getInitialWallBounces() {
        return 1 + Math.floor(Math.random() * 2);
      }

      function playBonusPickup() {
        if (!audioUnlocked) return;
        try {
          const ac = getAudioCtx();
          const osc = ac.createOscillator();
          const gain = ac.createGain();
          osc.type = "sine";
          osc.frequency.setValueAtTime(620, ac.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1500, ac.currentTime + 0.2);
          gain.gain.setValueAtTime(0.28, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
          osc.connect(gain);
          gain.connect(ac.destination);
          osc.start();
          osc.stop(ac.currentTime + 0.25);
        } catch (e) {}
      }

      function spawnBonusPill() {
        if (bonusPills.length >= MAX_BONUS_PILLS) return;
        const type = BONUS_TYPES[Math.floor(Math.random() * BONUS_TYPES.length)];
        const margin = BONUS_PILL_RADIUS + 24;
        const x = margin + Math.random() * (canvas.width - margin * 2);
        const y = margin + Math.random() * (canvas.height - margin * 2);
        const angle = Math.random() * Math.PI * 2;
        bonusPills.push({
          x,
          y,
          vx: Math.cos(angle) * BONUS_PILL_SPEED,
          vy: Math.sin(angle) * BONUS_PILL_SPEED,
          type,
          color: BONUS_COLORS[type],
          life: BONUS_PILL_LIFE,
          pulse: Math.random() * Math.PI * 2,
        });
      }

      function playExplosion() {
        if (!audioUnlocked) return;
        try {
          const ac = getAudioCtx();
          const bufferSize = ac.sampleRate * 0.45;
          const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.15);
          }
          const source = ac.createBufferSource();
          const filter = ac.createBiquadFilter();
          const gain = ac.createGain();
          source.buffer = buffer;
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(900, ac.currentTime);
          filter.frequency.exponentialRampToValueAtTime(70, ac.currentTime + 0.45);
          gain.gain.setValueAtTime(1.5, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.45);
          source.connect(filter);
          filter.connect(gain);
          gain.connect(ac.destination);
          source.start();
        } catch (e) {}
      }

      function playShot() {
        if (!audioUnlocked) return;
        try {
          const ac = getAudioCtx();
          const osc = ac.createOscillator();
          const gain = ac.createGain();
          osc.type = "square";
          osc.frequency.setValueAtTime(1100, ac.currentTime);
          osc.frequency.exponentialRampToValueAtTime(300, ac.currentTime + 0.08);
          gain.gain.setValueAtTime(0.22, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
          osc.connect(gain);
          gain.connect(ac.destination);
          osc.start();
          osc.stop(ac.currentTime + 0.08);
        } catch (e) {}
      }

      // Vertical direction each team's ship faces: top points down (+1), bottom points up (-1)
      function teamDir(team) {
        if (team === "top") return 1;
        if (team === "bottom") return -1;
        return 1; // "player" / "enemy" default
      }

      function clampX(x) {
        return Math.min(Math.max(x, SHIP_SIZE + 12), canvas.width - SHIP_SIZE - 12);
      }

      function clampY(y) {
        return Math.min(Math.max(y, SHIP_SIZE + 12), canvas.height - SHIP_SIZE - 12);
      }

      function createShip(id, team, x, y, colorOverride) {
        let color;
        if (colorOverride) {
          color = colorOverride;
        } else if (team === "top") {
          color = TOP_COLOR;
        } else if (team === "bottom") {
          color = BOTTOM_COLOR;
        } else if (team === "enemy") {
          color = COOP_ENEMY_COLOR;
        } else {
          color = TOP_COLOR; // "player" default
        }
        return {
          id,
          team,
          color,
          x: clampX(x),
          y: clampY(y),
          heat: 0,
          lastFire: 0,
          active: true,
          overheated: false,
          bonusType: null,
          bonusExpiry: 0,
          shield: false,
          ghostHits: 0,
          hp: 1,
          maxHp: 1,
        };
      }

      function createExplosion(x, y, color) {
        const particles = [];
        for (let i = 0; i < 26; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 90 + Math.random() * 250;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            size: 4 + Math.random() * 8,
            color,
          });
        }
        explosions.push({ particles });
      }

      function resetGame() {
        bullets.length = 0;
        explosions.length = 0;
        bonusPills.length = 0;
        bonusSpawnTimer = BONUS_SPAWN_INTERVAL;
        ships.clear();
        pointerToShip.clear();
        lastTime = 0;
        document.getElementById("replayButton").style.display = "none";
        resize();

        if (gameMode === "pvp") {
          teamWins = { top: 0, bottom: 0 };
          levelWins = { top: 0, bottom: 0 };
          currentLevel = 1;
          gamePhase = "playing";
          levelEndWinner = null;
          levelEndTimer = 0;
        } else if (gameMode === "coop") {
          coopKills = 0;
          coopPlayerDeaths = 0;
          coopVictory = false;
          coopEnemySpawnList = [];
          coopEnemySpawnTimer = 0;
          coopEnemyIdCounter = 0;
          startCoopWave(1);
        }
      }

      function showMenu() {
        gameMode = null;
        ships.clear();
        pointerToShip.clear();
        bullets.length = 0;
        explosions.length = 0;
        bonusPills.length = 0;
        document.getElementById("menuScreen").style.display = "flex";
        document.getElementById("replayButton").style.display = "none";
        resize();
      }

      function startGame(mode) {
        gameMode = mode;
        document.getElementById("menuScreen").style.display = "none";
        resetGame();
      }

      function startCoopWave(wave) {
        coopWave = wave;
        currentLevel = wave; // leverage existing speed/fire-rate scaling
        coopWavePhase = "playing";
        coopWaveEndTimer = 0;
        // Clear remaining enemies and projectiles
        for (const [id, ship] of ships.entries()) {
          if (ship.team === "enemy") ships.delete(id);
        }
        bullets.length = 0;
        bonusPills.length = 0;
        bonusSpawnTimer = BONUS_SPAWN_INTERVAL;
        // Queue enemies: 3 on wave 1, +1 per wave
        const enemyCount = 2 + wave;
        coopEnemySpawnList = [];
        const margin = 70;
        for (let i = 0; i < enemyCount; i++) {
          const x = margin + Math.random() * (canvas.width - margin * 2);
          const y = canvas.height * 0.25 + Math.random() * canvas.height * 0.5;
          coopEnemySpawnList.push({ x, y });
        }
        coopEnemySpawnTimer = 600;
      }

      function startNextCoopWave() {
        startCoopWave(coopWave + 1);
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        for (const ship of ships.values()) {
          ship.x = clampX(ship.x);
          ship.y = clampY(ship.y);
        }
      }

      function destroyShip(ship, bulletColor) {
        if (ship.team === "enemy" && ship.hp > 1) {
          ship.hp -= 1;
          createExplosion(ship.x, ship.y, "#ff6677");
          triggerFlash(bulletColor, ship.color);
          return;
        }

        // Shield absorbs the hit
        if (ship.shield) {
          ship.shield = false;
          ship.bonusType = null;
          createExplosion(ship.x, ship.y, "#4499ff");
          return;
        }

        // Ghost absorbs hits (up to ghostHits remaining)
        if (ship.ghostHits > 0) {
          ship.ghostHits--;
          createExplosion(ship.x, ship.y, "#bb88ff");
          if (ship.ghostHits === 0) ship.bonusType = null;
          return;
        }

        createExplosion(ship.x, ship.y, ship.color);
        playExplosion();
        triggerFlash(bulletColor, ship.color);

        // Remove ship immediately
        ships.delete(ship.id);
        for (const [ptId, shipId] of pointerToShip.entries()) {
          if (shipId === ship.id) {
            pointerToShip.delete(ptId);
            break;
          }
        }

        if (gameMode === "coop") {
          if (ship.team === "enemy") {
            coopKills++;
          } else if (ship.team === "player") {
            coopPlayerDeaths++;
            if (coopPlayerDeaths >= COOP_MAX_PLAYER_DEATHS && coopWavePhase === "playing") {
              coopWavePhase = "matchEnd";
              coopVictory = false;
              document.getElementById("replayButton").style.display = "block";
            }
          }
          return;
        }

        // PvP mode
        const winningTeam = ship.team === "top" ? "bottom" : "top";
        teamWins[winningTeam] += 1;

        // Check level win
        if (teamWins[winningTeam] >= WIN_MILESTONE && gamePhase === "playing") {
          levelWins[winningTeam] += 1;
          levelEndWinner = winningTeam;
          if (levelWins[winningTeam] >= LEVELS_TO_WIN) {
            gamePhase = "matchEnd";
            document.getElementById("replayButton").style.display = "block";
          } else {
            gamePhase = "levelEnd";
            levelEndTimer = LEVEL_END_DURATION;
          }
        }
      }

      function startNextLevel() {
        currentLevel += 1;
        teamWins = { top: 0, bottom: 0 };
        bullets.length = 0;
        explosions.length = 0;
        bonusPills.length = 0;
        bonusSpawnTimer = BONUS_SPAWN_INTERVAL;
        ships.clear();
        pointerToShip.clear();
        lastTime = 0;
        gamePhase = "playing";
        levelEndWinner = null;
      }

      function fireBullet(ship, now) {
        ship.lastFire = now;

        const speed = getBulletSpeed();
        const type = ship.bonusType;

        // Aim toward the nearest active enemy ship
        let aimVx = 0;
        let aimVy = teamDir(ship.team) * speed;
        let minDist = Infinity;
        for (const other of ships.values()) {
          if (other.team === ship.team || !other.active) continue;
          const dx = other.x - ship.x;
          const dy = other.y - ship.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < minDist) {
            minDist = dist;
            const len = dist || 1;
            aimVx = (dx / len) * speed;
            aimVy = (dy / len) * speed;
          }
        }

        if (type === "ring") {
          // Fire 8 bullets in all directions
          for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2;
            bullets.push({
              x: ship.x, y: ship.y,
              vx: Math.cos(a) * speed * 0.85,
              vy: Math.sin(a) * speed * 0.85,
              color: ship.color,
              ownerTeam: ship.team,
              btype: "ring",
            });
          }
        } else if (type === "laser") {
          bullets.push({
            x: ship.x, y: ship.y,
            vx: aimVx * 1.65,
            vy: aimVy * 1.65,
            color: ship.color,
            ownerTeam: ship.team,
            btype: "laser",
          });
        } else if (type === "triple") {
          const aimAngle = Math.atan2(aimVy, aimVx);
          for (const offset of [-0.32, 0, 0.32]) {
            const a = aimAngle + offset;
            bullets.push({
              x: ship.x, y: ship.y,
              vx: Math.cos(a) * speed,
              vy: Math.sin(a) * speed,
              color: ship.color,
              ownerTeam: ship.team,
              btype: "triple",
            });
          }
        } else if (type === "scatter") {
          // 5 bullets in a wide fan
          const aimAngle = Math.atan2(aimVy, aimVx);
          for (const offset of [-0.55, -0.28, 0, 0.28, 0.55]) {
            const a = aimAngle + offset;
            bullets.push({
              x: ship.x, y: ship.y,
              vx: Math.cos(a) * speed * 0.9,
              vy: Math.sin(a) * speed * 0.9,
              color: ship.color,
              ownerTeam: ship.team,
              btype: "scatter",
            });
          }
        } else if (type === "sniper") {
          // 1 very fast thin bullet
          bullets.push({
            x: ship.x, y: ship.y,
            vx: aimVx * 3.2,
            vy: aimVy * 3.2,
            color: ship.color,
            ownerTeam: ship.team,
            btype: "sniper",
          });
        } else if (type === "bounce") {
          // Bullet bounces exactly 2 times
          bullets.push({
            x: ship.x, y: ship.y,
            vx: aimVx, vy: aimVy,
            color: ship.color,
            ownerTeam: ship.team,
            btype: "bounce",
            wallBouncesLeft: 2,
          });
        } else if (type === "mega") {
          // 1 large slow bullet
          bullets.push({
            x: ship.x, y: ship.y,
            vx: aimVx * 0.55,
            vy: aimVy * 0.55,
            color: ship.color,
            ownerTeam: ship.team,
            btype: "mega",
          });
        } else if (type === "homing") {
          // Bullet curves toward nearest enemy
          bullets.push({
            x: ship.x, y: ship.y,
            vx: aimVx, vy: aimVy,
            color: ship.color,
            ownerTeam: ship.team,
            btype: "homing",
          });
        } else if (type === "burst") {
          // 4 bullets in a tight cluster
          const aimAngle = Math.atan2(aimVy, aimVx);
          for (const offset of [-0.12, -0.04, 0.04, 0.12]) {
            const a = aimAngle + offset;
            bullets.push({
              x: ship.x, y: ship.y,
              vx: Math.cos(a) * speed * 1.1,
              vy: Math.sin(a) * speed * 1.1,
              color: ship.color,
              ownerTeam: ship.team,
              btype: "burst",
            });
          }
        } else if (type === "piercing") {
          // Bullet passes through ships (hits multiple)
          bullets.push({
            x: ship.x, y: ship.y,
            vx: aimVx * 1.2,
            vy: aimVy * 1.2,
            color: ship.color,
            ownerTeam: ship.team,
            btype: "piercing",
            hitShips: new Set(),
          });
        } else if (type === "nova") {
          // Bullet explodes on impact into 6 shards
          bullets.push({
            x: ship.x, y: ship.y,
            vx: aimVx * 0.8,
            vy: aimVy * 0.8,
            color: ship.color,
            ownerTeam: ship.team,
            btype: "nova",
          });
        } else if (type === "quake") {
          // Dense radial volley
          for (let i = 0; i < 12; i++) {
            const a = (i / 12) * Math.PI * 2;
            bullets.push({
              x: ship.x, y: ship.y,
              vx: Math.cos(a) * speed * 1.05,
              vy: Math.sin(a) * speed * 1.05,
              color: ship.color,
              ownerTeam: ship.team,
              btype: "quake",
            });
          }
        } else if (type === "drill") {
          // Ultra-fast piercing projectile
          bullets.push({
            x: ship.x, y: ship.y,
            vx: aimVx * 2.25,
            vy: aimVy * 2.25,
            color: ship.color,
            ownerTeam: ship.team,
            btype: "drill",
            hitShips: new Set(),
          });
        } else {
          // normal, rapid (rapid only affects interval), ghost, stealth
          bullets.push({
            x: ship.x, y: ship.y,
            vx: aimVx, vy: aimVy,
            color: ship.color,
            ownerTeam: ship.team,
            btype: "normal",
          });
        }

        ship.heat = Math.min(MAX_HEAT, ship.heat + SHOT_HEAT);
        if (ship.heat >= MAX_HEAT) ship.overheated = true;
        playShot();
      }

      function update(dt) {
        if (gameMode === null) return;

        // Phase-transition gates
        if (gameMode === "pvp") {
          if (gamePhase === "levelEnd") {
            levelEndTimer -= dt;
            if (levelEndTimer <= 0) startNextLevel();
            return;
          }
          if (gamePhase === "matchEnd") return;
        } else if (gameMode === "coop") {
          if (coopWavePhase === "waveEnd") {
            coopWaveEndTimer -= dt;
            if (coopWaveEndTimer <= 0) startNextCoopWave();
            return;
          }
          if (coopWavePhase === "matchEnd") return;
        }

        const now = performance.now();
        const sec = dt / 1000;

        // Coop: spawn queued enemies
        if (gameMode === "coop" && coopEnemySpawnList.length > 0) {
          coopEnemySpawnTimer -= dt;
          if (coopEnemySpawnTimer <= 0) {
            const pos = coopEnemySpawnList.shift();
            const id = `enemy_${coopEnemyIdCounter++}`;
            const ship = createShip(id, "enemy", pos.x, pos.y);
            const hp = COOP_ENEMY_BASE_HP + (coopWave - 1) * COOP_ENEMY_HP_PER_WAVE;
            ship.maxHp = hp;
            ship.hp = hp;
            ship.lastFire = performance.now() + 800 + Math.random() * 600;
            ships.set(id, ship);
            coopEnemySpawnTimer = COOP_ENEMY_SPAWN_INTERVAL;
          }
        }

        // Coop: enemy movement toward nearest player
        if (gameMode === "coop") {
          for (const ship of ships.values()) {
            if (ship.team !== "enemy") continue;
            let targetX = ship.x;
            let targetY = canvas.height * 0.8;
            let minDist = Infinity;
            let targetShip = null;
            for (const other of ships.values()) {
              if (other.team !== "player") continue;
              const dx = other.x - ship.x;
              const dy = other.y - ship.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < minDist) {
                minDist = dist;
                targetX = other.x;
                targetY = other.y;
                targetShip = other;
              }
            }
            const dx = targetX - ship.x;
            const dy = targetY - ship.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const wavePressure = 1 + Math.min(1.2, (coopWave - 1) * 0.15);
            const speed = COOP_ENEMY_BASE_MOVE_SPEED * wavePressure;
            if (dist > 56) {
              ship.x = clampX(ship.x + (dx / dist) * speed * sec);
              ship.y = clampY(ship.y + (dy / dist) * speed * sec);
            }

            if (targetShip && minDist <= SHIP_HIT_RADIUS * 0.95 && targetShip.active) {
              destroyShip(targetShip, ship.color);
            }
          }

          // Coop: check wave completion
          if (coopWavePhase === "playing" && coopEnemySpawnList.length === 0) {
            const enemiesAlive = [...ships.values()].filter(s => s.team === "enemy").length;
            if (enemiesAlive === 0 && coopEnemyIdCounter > 0) {
              if (coopWave >= COOP_WAVES_TO_WIN) {
                coopWavePhase = "matchEnd";
                coopVictory = true;
                document.getElementById("replayButton").style.display = "block";
              } else {
                coopWavePhase = "waveEnd";
                coopWaveEndTimer = COOP_WAVE_END_DURATION;
              }
            }
          }
        }

        for (const ship of ships.values()) {
          ship.heat = Math.max(0, ship.heat - COOL_RATE * sec);
          if (ship.overheated && ship.heat <= HEAT_RECOVERY_LEVEL) ship.overheated = false;

          if (ship.active && now - ship.lastFire >= getShipFireInterval(ship)) {
            fireBullet(ship, now);
          }
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
          const bullet = bullets[i];
          bullet.x += bullet.vx * sec;
          bullet.y += bullet.vy * sec;

          // Homing bullets curve toward nearest enemy
          if (bullet.btype === "homing") {
            let nearestEnemy = null;
            let minDist = Infinity;
            for (const s of ships.values()) {
              if (s.team === bullet.ownerTeam || !s.active) continue;
              const dx = s.x - bullet.x;
              const dy = s.y - bullet.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < minDist) { minDist = dist; nearestEnemy = s; }
            }
            if (nearestEnemy) {
              const dx = nearestEnemy.x - bullet.x;
              const dy = nearestEnemy.y - bullet.y;
              const len = Math.sqrt(dx * dx + dy * dy) || 1;
              const turnRate = 3.2 * sec;
              const curAngle = Math.atan2(bullet.vy, bullet.vx);
              const targetAngle = Math.atan2(dy / len, dx / len);
              let dAngle = targetAngle - curAngle;
              while (dAngle > Math.PI) dAngle -= Math.PI * 2;
              while (dAngle < -Math.PI) dAngle += Math.PI * 2;
              const newAngle = curAngle + Math.sign(dAngle) * Math.min(Math.abs(dAngle), turnRate);
              const spd = Math.sqrt(bullet.vx * bullet.vx + bullet.vy * bullet.vy);
              bullet.vx = Math.cos(newAngle) * spd;
              bullet.vy = Math.sin(newAngle) * spd;
            }
          }

          if (bullet.wallBouncesLeft == null) {
            bullet.wallBouncesLeft = getInitialWallBounces();
          }

          // Missiles reflect 1-2 times before leaving the arena
          if (bullet.wallBouncesLeft > 0) {
            if (bullet.x <= BULLET_RADIUS && bullet.vx < 0) {
              bullet.x = BULLET_RADIUS;
              bullet.vx = -bullet.vx;
              bullet.wallBouncesLeft--;
            } else if (bullet.x >= canvas.width - BULLET_RADIUS && bullet.vx > 0) {
              bullet.x = canvas.width - BULLET_RADIUS;
              bullet.vx = -bullet.vx;
              bullet.wallBouncesLeft--;
            }
            if (bullet.y <= BULLET_RADIUS && bullet.vy < 0) {
              bullet.y = BULLET_RADIUS;
              bullet.vy = -bullet.vy;
              bullet.wallBouncesLeft--;
            } else if (bullet.y >= canvas.height - BULLET_RADIUS && bullet.vy > 0) {
              bullet.y = canvas.height - BULLET_RADIUS;
              bullet.vy = -bullet.vy;
              bullet.wallBouncesLeft--;
            }
          }

          if (
            bullet.x < -50 ||
            bullet.x > canvas.width + 50 ||
            bullet.y < -50 ||
            bullet.y > canvas.height + 50
          ) {
            bullets.splice(i, 1);
            continue;
          }

          let hit = false;
          const bRadius = bullet.btype === "mega" ? 18 : BULLET_RADIUS;
          for (const ship of ships.values()) {
            if (ship.team === bullet.ownerTeam || !ship.active) continue;
            if (bullet.hitShips && bullet.hitShips.has(ship.id)) continue;
            const dx = bullet.x - ship.x;
            const dy = bullet.y - ship.y;
            if (Math.sqrt(dx * dx + dy * dy) < SHIP_HIT_RADIUS + bRadius) {
              if (bullet.btype === "nova") {
                const novaSpeed = getBulletSpeed();
                for (let n = 0; n < 6; n++) {
                  const na = (n / 6) * Math.PI * 2;
                  bullets.push({
                    x: bullet.x, y: bullet.y,
                    vx: Math.cos(na) * novaSpeed * 0.65,
                    vy: Math.sin(na) * novaSpeed * 0.65,
                    color: bullet.color,
                    ownerTeam: bullet.ownerTeam,
                    btype: "nova_shard",
                  });
                }
              }
              destroyShip(ship, bullet.color);
              if (bullet.btype === "piercing" || bullet.btype === "drill") {
                bullet.hitShips.add(ship.id);
              } else {
                bullets.splice(i, 1);
                hit = true;
                break;
              }
            }
          }
          if (hit) continue;
        }

        for (let e = explosions.length - 1; e >= 0; e--) {
          let alive = false;
          for (const p of explosions[e].particles) {
            p.x += p.vx * sec;
            p.y += p.vy * sec;
            p.vy += 180 * sec;
            p.life -= sec * 1.8;
            if (p.life > 0) alive = true;
          }
          if (!alive) explosions.splice(e, 1);
        }

        // Expire active bonuses on ships
        for (const ship of ships.values()) {
          if (ship.bonusType && now > ship.bonusExpiry) {
            ship.bonusType = null;
            ship.ghostHits = 0;
          }
        }

        // Spawn bonus pills
        bonusSpawnTimer -= dt;
        if (bonusSpawnTimer <= 0) {
          spawnBonusPill();
          bonusSpawnTimer = BONUS_SPAWN_INTERVAL;
        }

        // Update bonus pills (move, bounce, expire, collect)
        for (let i = bonusPills.length - 1; i >= 0; i--) {
          const pill = bonusPills[i];
          pill.life -= dt;
          pill.pulse += dt * 0.0045;
          pill.x += pill.vx * sec;
          pill.y += pill.vy * sec;
          if (pill.x < BONUS_PILL_RADIUS) { pill.x = BONUS_PILL_RADIUS; pill.vx = Math.abs(pill.vx); }
          if (pill.x > canvas.width - BONUS_PILL_RADIUS) { pill.x = canvas.width - BONUS_PILL_RADIUS; pill.vx = -Math.abs(pill.vx); }
          if (pill.y < BONUS_PILL_RADIUS) { pill.y = BONUS_PILL_RADIUS; pill.vy = Math.abs(pill.vy); }
          if (pill.y > canvas.height - BONUS_PILL_RADIUS) { pill.y = canvas.height - BONUS_PILL_RADIUS; pill.vy = -Math.abs(pill.vy); }
          if (pill.life <= 0) { bonusPills.splice(i, 1); continue; }
          // Ship collision
          let collected = false;
          for (const ship of ships.values()) {
            if (!ship.active) continue;
            const dx = pill.x - ship.x;
            const dy = pill.y - ship.y;
            if (Math.sqrt(dx * dx + dy * dy) < SHIP_HIT_RADIUS + BONUS_PILL_RADIUS) {
              if (pill.type === "shield") {
                ship.shield = true;
              } else if (pill.type === "ghost") {
                ship.bonusType = "ghost";
                ship.bonusExpiry = now + BONUS_EFFECT_DURATION;
                ship.ghostHits = 3;
              } else {
                ship.bonusType = pill.type;
                ship.bonusExpiry = now + BONUS_EFFECT_DURATION;
              }
              bonusPills.splice(i, 1);
              playBonusPickup();
              collected = true;
              break;
            }
          }
          if (collected) continue;
        }
      }

      function drawShip(x, y, color, direction, crossed = false, size = SHIP_SIZE) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, y + direction * size);
        ctx.lineTo(x - size * 0.65, y - direction * size * 0.5);
        ctx.lineTo(x + size * 0.65, y - direction * size * 0.5);
        ctx.closePath();

        const gradient = ctx.createLinearGradient(x, y - size, x, y + size);
        gradient.addColorStop(0, "#ffffff");
        gradient.addColorStop(0.45, color);
        gradient.addColorStop(1, color + "88");
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.lineWidth = crossed ? 1.4 : 2;
        ctx.strokeStyle = "#ffffffcc";
        ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(
          x,
          y - direction * size * 0.5,
          size * 0.22,
          size * 0.12,
          0,
          0,
          Math.PI * 2
        );
        ctx.fillStyle = "#ffffff66";
        ctx.fill();

        if (crossed) {
          ctx.strokeStyle = "#ff4b4b";
          ctx.lineWidth = Math.max(2, size * 0.15);
          ctx.beginPath();
          ctx.moveTo(x - size * 0.9, y - size * 0.9);
          ctx.lineTo(x + size * 0.9, y + size * 0.9);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawEnemyMonsterShip(x, y, direction, size, hpRatio = 1) {
        ctx.save();
        ctx.translate(x, y);
        if (direction < 0) ctx.rotate(Math.PI);

        const bodyGradient = ctx.createLinearGradient(0, -size * 0.95, 0, size * 0.95);
        bodyGradient.addColorStop(0, "#ffd8dc");
        bodyGradient.addColorStop(0.3, "#ff4455");
        bodyGradient.addColorStop(1, "#2a060c");
        ctx.fillStyle = bodyGradient;
        ctx.strokeStyle = "#ffe4e8";
        ctx.lineWidth = 2.2;

        ctx.beginPath();
        ctx.moveTo(0, size * 1.05);
        ctx.lineTo(-size * 0.82, -size * 0.62);
        ctx.lineTo(-size * 0.32, -size * 0.22);
        ctx.lineTo(-size * 0.18, -size * 1.02);
        ctx.lineTo(0, -size * 0.72);
        ctx.lineTo(size * 0.18, -size * 1.02);
        ctx.lineTo(size * 0.32, -size * 0.22);
        ctx.lineTo(size * 0.82, -size * 0.62);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#fff4f6";
        ctx.shadowColor = "#ff7080";
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.moveTo(-size * 0.08, -size * 0.48);
        ctx.lineTo(-size * 0.24, -size * 0.24);
        ctx.lineTo(-size * 0.02, -size * 0.17);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(size * 0.08, -size * 0.48);
        ctx.lineTo(size * 0.24, -size * 0.24);
        ctx.lineTo(size * 0.02, -size * 0.17);
        ctx.closePath();
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#ffffff66";
        ctx.beginPath();
        ctx.ellipse(0, -size * 0.2, size * 0.22, size * 0.12, 0, 0, Math.PI * 2);
        ctx.fill();

        const barW = size * 1.85;
        const barH = Math.max(5, size * 0.12);
        const by = -size * 1.35;
        ctx.fillStyle = "#00000088";
        ctx.fillRect(-barW / 2, by, barW, barH);
        ctx.fillStyle = hpRatio > 0.35 ? "#ff6677" : "#ff1f3d";
        ctx.fillRect(-barW / 2, by, barW * Math.max(0, Math.min(1, hpRatio)), barH);
        ctx.strokeStyle = "#ffd6db";
        ctx.lineWidth = 1.2;
        ctx.strokeRect(-barW / 2, by, barW, barH);

        ctx.restore();
      }

      function drawWinBar(team, labelY, barY) {
        const wins = teamWins[team];
        const lvWins = levelWins[team];
        const color = team === "top" ? TOP_COLOR : BOTTOM_COLOR;
        const progress = wins % WIN_MILESTONE;
        const barW = 120;
        const barH = 7;
        const x = 18;

        ctx.save();

        // Level wins as filled circles
        for (let m = 0; m < LEVELS_TO_WIN; m++) {
          ctx.beginPath();
          ctx.arc(x + m * 20 + 7, labelY - 10, 6, 0, Math.PI * 2);
          ctx.fillStyle = m < lvWins ? color : "#ffffff22";
          ctx.fill();
        }

        // Text: kills this round
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "left";
        ctx.fillStyle = color;
        ctx.fillText(
          `Équipe ${team === "top" ? "haut" : "bas"} — victoires : ${wins}`,
          x + LEVELS_TO_WIN * 20 + 4,
          labelY
        );

        // Progress bar background
        ctx.fillStyle = "#ffffff22";
        ctx.fillRect(x, barY, barW, barH);

        // Progress bar fill
        ctx.fillStyle = color;
        ctx.fillRect(x, barY, (progress / WIN_MILESTONE) * barW, barH);

        // Divider ticks
        ctx.fillStyle = "#000000aa";
        for (let i = 1; i < WIN_MILESTONE; i++) {
          ctx.fillRect(x + (i / WIN_MILESTONE) * barW - 1, barY, 2, barH);
        }

        ctx.restore();
      }

      function drawLevelEnd() {
        const winColor = levelEndWinner === "top" ? TOP_COLOR : BOTTOM_COLOR;
        const winLabel = levelEndWinner === "top" ? "HAUT" : "BAS";
        const progress = Math.max(0, 1 - levelEndTimer / LEVEL_END_DURATION);

        ctx.save();
        ctx.globalAlpha = Math.min(1, progress * 4);

        // Dark overlay
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        // Level win announcement
        ctx.textAlign = "center";
        ctx.shadowColor = winColor;
        ctx.shadowBlur = 28;
        ctx.fillStyle = winColor;
        ctx.font = "bold 38px Arial";
        ctx.fillText(`ÉQUIPE ${winLabel} GAGNE !`, cx, cy - 28);

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 22px Arial";
        ctx.shadowBlur = 12;
        ctx.fillText(`Niveau ${currentLevel} terminé`, cx, cy + 12);

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#f7e4d2cc";
        ctx.font = "16px Arial";
        ctx.fillText(`Niveau ${currentLevel + 1} dans…`, cx, cy + 46);

        // Countdown bar
        const barW = 200;
        const barH = 8;
        const barX = cx - barW / 2;
        const barY = cy + 60;
        ctx.fillStyle = "#ffffff22";
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = winColor;
        ctx.fillRect(barX, barY, barW * (1 - levelEndTimer / LEVEL_END_DURATION), barH);

        // Level wins summary
        ctx.shadowBlur = 0;
        ctx.font = "bold 15px Arial";
        ctx.fillStyle = TOP_COLOR;
        ctx.fillText(`Haut : ${levelWins.top} niveau(x)`, cx - 80, cy + 95);
        ctx.fillStyle = BOTTOM_COLOR;
        ctx.fillText(`Bas : ${levelWins.bottom} niveau(x)`, cx + 80, cy + 95);

        ctx.restore();
      }

      function drawMatchEnd() {
        const winColor = levelEndWinner === "top" ? TOP_COLOR : BOTTOM_COLOR;
        const winLabel = levelEndWinner === "top" ? "HAUT" : "BAS";

        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2 - 40;

        ctx.textAlign = "center";
        ctx.shadowColor = winColor;
        ctx.shadowBlur = 36;
        ctx.fillStyle = winColor;
        ctx.font = "bold 44px Arial";
        ctx.fillText(`VICTOIRE — ÉQUIPE ${winLabel}`, cx, cy);

        ctx.shadowBlur = 14;
        ctx.fillStyle = "#fff2d6";
        ctx.font = "bold 22px Arial";
        ctx.fillText(`${LEVELS_TO_WIN} niveaux remportés !`, cx, cy + 44);

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#f7e4d2aa";
        ctx.font = "16px Arial";
        ctx.fillText(`Haut : ${levelWins.top} · Bas : ${levelWins.bottom}`, cx, cy + 78);

        ctx.restore();
      }

      function drawHud() {
        if (gameMode === "coop") {
          drawCoopHud();
          return;
        }

        drawWinBar("top", 24, 30);
        drawWinBar("bottom", canvas.height - 14, canvas.height - 22);

        // Current level indicator
        ctx.save();
        ctx.textAlign = "right";
        ctx.fillStyle = "#f7e4d2cc";
        ctx.font = "bold 14px Arial";
        ctx.fillText(`Niveau ${currentLevel}`, canvas.width - 18, 24);
        ctx.restore();

        // Center dividing line (decorative — ships may cross it freely)
        ctx.save();
        ctx.strokeStyle = "#ffffff22";
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(0, canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();
        ctx.restore();

        // Instructions near the center line
        ctx.save();
        ctx.fillStyle = "#f7e4d288";
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(
          "Toucher l'écran pour invoquer des vaisseaux — haut contre bas",
          canvas.width / 2,
          canvas.height / 2 + 18
        );
        ctx.restore();
      }

      function drawCoopHud() {
        const cx = canvas.width / 2;
        ctx.save();

        // Wave indicator (top center)
        ctx.textAlign = "center";
        ctx.fillStyle = "#f7e4d2cc";
        ctx.font = "bold 14px Arial";
        ctx.fillText(`Vague ${coopWave} / ${COOP_WAVES_TO_WIN}`, cx, 22);

        // Kills (top left)
        ctx.textAlign = "left";
        ctx.fillStyle = COOP_ENEMY_COLOR;
        ctx.fillText(`☠ ${coopKills}`, 18, 22);

        // Lives / deaths (top right)
        const livesLeft = Math.max(0, COOP_MAX_PLAYER_DEATHS - coopPlayerDeaths);
        ctx.textAlign = "right";
        ctx.fillStyle = livesLeft > 3 ? "#44ff88" : livesLeft > 0 ? "#ffdd00" : "#ff4455";
        ctx.fillText(`♥ ${livesLeft}`, canvas.width - 18, 22);

        // Instruction hint
        ctx.textAlign = "center";
        ctx.fillStyle = "#f7e4d255";
        ctx.font = "12px Arial";
        ctx.fillText("Toucher l'écran pour placer vos vaisseaux", cx, canvas.height - 10);

        ctx.restore();
      }

      function drawCoopWaveEnd() {
        const nextWave = coopWave + 1;
        const progress = Math.max(0, 1 - coopWaveEndTimer / COOP_WAVE_END_DURATION);
        ctx.save();
        ctx.globalAlpha = Math.min(1, progress * 4);
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        ctx.textAlign = "center";
        ctx.shadowColor = "#44ff88";
        ctx.shadowBlur = 28;
        ctx.fillStyle = "#44ff88";
        ctx.font = "bold 38px Arial";
        ctx.fillText(`VAGUE ${coopWave} TERMINÉE !`, cx, cy - 28);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 22px Arial";
        ctx.shadowBlur = 12;
        ctx.fillText(`Prochaine vague : ${nextWave}`, cx, cy + 16);
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#f7e4d2cc";
        ctx.font = "16px Arial";
        const barW = 200;
        const barH = 8;
        ctx.fillStyle = "#ffffff22";
        ctx.fillRect(cx - barW / 2, cy + 36, barW, barH);
        ctx.fillStyle = "#44ff88";
        ctx.fillRect(cx - barW / 2, cy + 36, barW * (1 - coopWaveEndTimer / COOP_WAVE_END_DURATION), barH);
        ctx.restore();
      }

      function drawCoopMatchEnd() {
        ctx.save();
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2 - 40;
        ctx.textAlign = "center";
        if (coopVictory) {
          ctx.shadowColor = "#44ff88";
          ctx.shadowBlur = 36;
          ctx.fillStyle = "#44ff88";
          ctx.font = "bold 44px Arial";
          ctx.fillText("VICTOIRE !", cx, cy);
          ctx.shadowBlur = 14;
          ctx.fillStyle = "#fff2d6";
          ctx.font = "bold 22px Arial";
          ctx.fillText(`${COOP_WAVES_TO_WIN} vagues survécues !`, cx, cy + 44);
        } else {
          ctx.shadowColor = COOP_ENEMY_COLOR;
          ctx.shadowBlur = 36;
          ctx.fillStyle = COOP_ENEMY_COLOR;
          ctx.font = "bold 44px Arial";
          ctx.fillText("DÉFAITE", cx, cy);
          ctx.shadowBlur = 14;
          ctx.fillStyle = "#fff2d6";
          ctx.font = "bold 22px Arial";
          ctx.fillText(`Vague ${coopWave} — ${coopKills} ennemi(s) éliminé(s)`, cx, cy + 44);
        }
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#f7e4d2aa";
        ctx.font = "16px Arial";
        ctx.fillText(`Pertes subies : ${coopPlayerDeaths} / ${COOP_MAX_PLAYER_DEATHS}`, cx, cy + 80);
        ctx.restore();
      }

      function drawBonusPills() {
        for (const pill of bonusPills) {
          const alpha = pill.life < 2000 ? pill.life / 2000 : 1;
          const pulse = 1 + 0.18 * Math.sin(pill.pulse);
          const r = BONUS_PILL_RADIUS * pulse;

          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.shadowColor = pill.color;
          ctx.shadowBlur = 18;

          // Outer spinning ring
          ctx.beginPath();
          ctx.arc(pill.x, pill.y, r, 0, Math.PI * 2);
          ctx.strokeStyle = pill.color;
          ctx.lineWidth = 2.5;
          ctx.stroke();

          // Inner glow fill
          const grad = ctx.createRadialGradient(pill.x, pill.y, 0, pill.x, pill.y, r * 0.7);
          grad.addColorStop(0, pill.color + "88");
          grad.addColorStop(1, pill.color + "00");
          ctx.beginPath();
          ctx.arc(pill.x, pill.y, r * 0.7, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();

          // Icon
          ctx.shadowBlur = 0;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = "#ffffff";
          ctx.font = `bold ${Math.round(r * 0.85)}px Arial`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(BONUS_ICONS[pill.type], pill.x, pill.y);
          ctx.textBaseline = "alphabetic";

          ctx.restore();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#2a1308");
        gradient.addColorStop(0.5, "#4b250f");
        gradient.addColorStop(1, "#251106");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ffffff08";
        ctx.fillRect(0, 0, canvas.width, canvas.height / 2);
        ctx.fillStyle = "#00000010";
        ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

        for (const ship of ships.values()) {
          if (!ship.active) continue;
          ctx.save();
          if (ship.overheated) ctx.globalAlpha = 0.45;
          else if (ship.bonusType === "stealth") ctx.globalAlpha = 0.18;
          else if (ship.ghostHits > 0) ctx.globalAlpha = 0.42;
          if (ship.team === "enemy") {
            drawEnemyMonsterShip(
              ship.x,
              ship.y,
              teamDir(ship.team),
              SHIP_SIZE * 1.08,
              ship.maxHp > 0 ? ship.hp / ship.maxHp : 1
            );
          } else {
            drawShip(ship.x, ship.y, ship.color, teamDir(ship.team));
          }
          ctx.restore();

          // Shield bubble
          if (ship.shield) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(ship.x, ship.y, SHIP_SIZE * 1.45, 0, Math.PI * 2);
            ctx.strokeStyle = "#4499ff";
            ctx.lineWidth = 2.5;
            ctx.shadowColor = "#4499ff";
            ctx.shadowBlur = 14;
            ctx.globalAlpha = 0.8;
            ctx.stroke();
            ctx.restore();
          }

          // Active bonus timer arc
          if (ship.bonusType) {
            const remaining = Math.max(0, ship.bonusExpiry - performance.now()) / BONUS_EFFECT_DURATION;
            const iy = ship.team === "top" ? ship.y - SHIP_SIZE * 1.35 : ship.y + SHIP_SIZE * 1.35;
            ctx.save();
            ctx.beginPath();
            ctx.arc(ship.x, iy, 9, -Math.PI / 2, -Math.PI / 2 + remaining * Math.PI * 2);
            ctx.strokeStyle = BONUS_COLORS[ship.bonusType];
            ctx.lineWidth = 3;
            ctx.shadowColor = BONUS_COLORS[ship.bonusType];
            ctx.shadowBlur = 8;
            ctx.stroke();
            ctx.fillStyle = BONUS_COLORS[ship.bonusType];
            ctx.font = "bold 9px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(BONUS_ICONS[ship.bonusType], ship.x, iy);
            ctx.textBaseline = "alphabetic";
            ctx.restore();
          }
        }

        for (const bullet of bullets) {
          ctx.save();
          ctx.shadowColor = bullet.color;
          if (bullet.btype === "laser") {
            const angle = Math.atan2(bullet.vy, bullet.vx);
            ctx.translate(bullet.x, bullet.y);
            ctx.rotate(angle);
            ctx.shadowBlur = 22;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(-20, -2.5, 40, 5);
            ctx.fillStyle = bullet.color;
            ctx.fillRect(-18, -1.5, 36, 3);
          } else if (bullet.btype === "sniper") {
            const angle = Math.atan2(bullet.vy, bullet.vx);
            ctx.translate(bullet.x, bullet.y);
            ctx.rotate(angle);
            ctx.shadowBlur = 14;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(-30, -1.2, 60, 2.4);
            ctx.fillStyle = bullet.color;
            ctx.fillRect(-28, -0.6, 56, 1.2);
          } else if (bullet.btype === "mega") {
            ctx.shadowBlur = 28;
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, 18, 0, Math.PI * 2);
            ctx.fillStyle = bullet.color;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, 9, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffffaa";
            ctx.fill();
          } else if (bullet.btype === "nova") {
            ctx.shadowBlur = 24;
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, BULLET_RADIUS * 1.5, 0, Math.PI * 2);
            ctx.fillStyle = bullet.color;
            ctx.fill();
          } else if (bullet.btype === "nova_shard") {
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, BULLET_RADIUS * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = bullet.color;
            ctx.fill();
          } else if (bullet.btype === "drill") {
            const angle = Math.atan2(bullet.vy, bullet.vx);
            ctx.translate(bullet.x, bullet.y);
            ctx.rotate(angle);
            ctx.shadowBlur = 20;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(-18, -2, 36, 4);
            ctx.fillStyle = bullet.color;
            ctx.fillRect(-15, -1.2, 30, 2.4);
          } else {
            const r =
              bullet.btype === "ring" ? BULLET_RADIUS * 0.78 :
              bullet.btype === "scatter" ? BULLET_RADIUS * 0.9 :
              bullet.btype === "quake" ? BULLET_RADIUS * 1.05 :
              bullet.btype === "piercing" ? BULLET_RADIUS * 0.85 :
              BULLET_RADIUS;
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, r, 0, Math.PI * 2);
            ctx.fillStyle = bullet.color;
            ctx.shadowBlur = bullet.btype === "homing" ? 18 : 14;
            ctx.fill();
          }
          ctx.restore();
        }

        for (const exp of explosions) {
          for (const p of exp.particles) {
            if (p.life <= 0) continue;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.restore();
          }
        }

        drawHud();
        drawBonusPills();

        if (gameMode === "pvp") {
          if (gamePhase === "levelEnd") drawLevelEnd();
          if (gamePhase === "matchEnd") drawMatchEnd();
        } else if (gameMode === "coop") {
          if (coopWavePhase === "waveEnd") drawCoopWaveEnd();
          if (coopWavePhase === "matchEnd") drawCoopMatchEnd();
        }
      }

      function gameLoop(timestamp) {
        const dt = lastTime ? Math.min(timestamp - lastTime, 100) : 16;
        lastTime = timestamp;
        update(dt);
        draw();
        requestAnimationFrame(gameLoop);
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        unlockAudio();
        const isPlaying = gameMode === "pvp" ? gamePhase === "playing" : coopWavePhase === "playing";
        if (gameMode === null || !isPlaying) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        const team = gameMode === "coop" ? "player" : (y < canvas.height / 2 ? "top" : "bottom");
        const shipId = `touch_${e.pointerId}`;
        if (ships.has(shipId)) return;
        const ship = createShip(shipId, team, x, y);
        ship.lastFire = performance.now();
        ships.set(shipId, ship);
        pointerToShip.set(e.pointerId, shipId);
        canvas.setPointerCapture(e.pointerId);
      });

      canvas.addEventListener("pointermove", (e) => {
        e.preventDefault();
        const shipId = pointerToShip.get(e.pointerId);
        if (!shipId) return;
        const ship = ships.get(shipId);
        if (!ship) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        ship.x = clampX(x);
        ship.y = clampY(y);
      });

      function releasePointer(e) {
        const shipId = pointerToShip.get(e.pointerId);
        if (shipId) {
          ships.delete(shipId);
          pointerToShip.delete(e.pointerId);
        }
      }

      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);

      window.addEventListener("resize", resize);

      document.getElementById("btnPvp").addEventListener("click", () => startGame("pvp"));
      document.getElementById("btnCoop").addEventListener("click", () => startGame("coop"));

      document.getElementById("replayButton").addEventListener("click", () => {
        showMenu();
      });

      showMenu();
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
