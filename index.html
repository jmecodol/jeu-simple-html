<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeu Simple</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        position: relative;
        background-color: #2b1a0e;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100dvh;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      h1 {
        color: #d4a07a;
        font-size: 1.2rem;
        padding: 8px 16px;
        flex-shrink: 0;
        text-align: center;
      }

      canvas {
        display: block;
        width: 100%;
        flex: 1;
        touch-action: none;
        cursor: crosshair;
      }

      #replayButton {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        border: none;
        border-radius: 999px;
        padding: 14px 28px;
        background: #fff2d6;
        color: #4f2b10;
        font-size: 1.05rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        display: none;
        z-index: 20;
      }
    </style>
  </head>
  <body>
    <h1>Guerre spatiale : haut contre bas</h1>
    <canvas id="gameCanvas"></canvas>
    <button id="replayButton" type="button">Rejouer</button>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const replayButton = document.getElementById("replayButton");

      const SHIP_SIZE = 36;
      const BULLET_SPEED = 520;
      const BULLET_RADIUS = 6;
      const SHIP_HIT_RADIUS = 34;
      const FIRE_INTERVAL = 190;
      const MOVE_SPEED = 360;
      const MAX_HEAT = 100;
      const SHOT_HEAT = 18;
      const COOL_RATE = 34;
      const HEAT_RECOVERY_LEVEL = 35;
      const MAX_LOSSES = 5;
      const RESPAWN_DELAY = 1200;
      const TOP_COLOR = "#7bdff2";
      const BOTTOM_COLOR = "#ff9f68";
      const TOP_KEY_ID = "key_top";
      const BOTTOM_KEY_ID = "key_bottom";

      // ships: Map<shipId, ship>  — one entry per active finger + 2 keyboard ships
      const ships = new Map();
      const bullets = [];
      const explosions = [];
      const pointerToShip = new Map();
      const keyState = new Set();

      let teamLosses = { top: 0, bottom: 0 };
      let gameOver = false;
      let winnerText = "";
      let lastTime = 0;
      let audioCtx = null;
      let flashTimeout = null;
      let audioUnlocked = false;

      const flashOverlay = document.createElement("div");
      flashOverlay.style.cssText =
        "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;z-index:10;";
      document.body.appendChild(flashOverlay);

      function blendColors(hex1, hex2) {
        const r = Math.round((parseInt(hex1.slice(1, 3), 16) + parseInt(hex2.slice(1, 3), 16)) / 2);
        const g = Math.round((parseInt(hex1.slice(3, 5), 16) + parseInt(hex2.slice(3, 5), 16)) / 2);
        const b = Math.round((parseInt(hex1.slice(5, 7), 16) + parseInt(hex2.slice(5, 7), 16)) / 2);
        return `rgb(${r},${g},${b})`;
      }

      function triggerFlash(color1, color2) {
        if (flashTimeout) clearTimeout(flashTimeout);
        flashOverlay.style.backgroundColor = blendColors(color1, color2);
        let count = 0;

        function step() {
          if (count >= 8) {
            flashOverlay.style.opacity = "0";
            flashTimeout = null;
            return;
          }
          flashOverlay.style.opacity = count % 2 === 0 ? "0.65" : "0";
          count++;
          flashTimeout = setTimeout(step, 10);
        }

        step();
      }

      function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }

      function unlockAudio() {
        audioUnlocked = true;
        if (audioCtx && audioCtx.state === "suspended") {
          audioCtx.resume().catch(() => {});
        }
      }

      function playExplosion() {
        if (!audioUnlocked) return;
        try {
          const ac = getAudioCtx();
          const bufferSize = ac.sampleRate * 0.45;
          const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.15);
          }
          const source = ac.createBufferSource();
          const filter = ac.createBiquadFilter();
          const gain = ac.createGain();
          source.buffer = buffer;
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(900, ac.currentTime);
          filter.frequency.exponentialRampToValueAtTime(70, ac.currentTime + 0.45);
          gain.gain.setValueAtTime(1.5, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.45);
          source.connect(filter);
          filter.connect(gain);
          gain.connect(ac.destination);
          source.start();
        } catch (e) {}
      }

      function playShot() {
        if (!audioUnlocked) return;
        try {
          const ac = getAudioCtx();
          const osc = ac.createOscillator();
          const gain = ac.createGain();
          osc.type = "square";
          osc.frequency.setValueAtTime(1100, ac.currentTime);
          osc.frequency.exponentialRampToValueAtTime(300, ac.currentTime + 0.08);
          gain.gain.setValueAtTime(0.22, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
          osc.connect(gain);
          gain.connect(ac.destination);
          osc.start();
          osc.stop(ac.currentTime + 0.08);
        } catch (e) {}
      }

      // Vertical direction each team's ship faces: top points down (+1), bottom points up (-1)
      function teamDir(team) {
        return team === "top" ? 1 : -1;
      }

      function clampX(x) {
        return Math.min(Math.max(x, SHIP_SIZE + 12), canvas.width - SHIP_SIZE - 12);
      }

      function clampY(y) {
        return Math.min(Math.max(y, SHIP_SIZE + 12), canvas.height - SHIP_SIZE - 12);
      }

      function createShip(id, team, x, y, isKeyboard) {
        return {
          id,
          team,
          color: team === "top" ? TOP_COLOR : BOTTOM_COLOR,
          x: clampX(x),
          y: clampY(y),
          heat: 0,
          lastFire: 0,
          active: true,
          overheated: false,
          respawnAt: 0,
          isKeyboard: !!isKeyboard,
          // Last known position (finger or keyboard) used when respawning
          targetX: x,
          targetY: y,
        };
      }

      function createExplosion(x, y, color) {
        const particles = [];
        for (let i = 0; i < 26; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 90 + Math.random() * 250;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            size: 4 + Math.random() * 8,
            color,
          });
        }
        explosions.push({ particles });
      }

      function initKeyboardShips() {
        const now = performance.now();
        const kTop = createShip(TOP_KEY_ID, "top", canvas.width / 2, canvas.height * 0.14, true);
        kTop.lastFire = now;
        ships.set(TOP_KEY_ID, kTop);

        const kBottom = createShip(BOTTOM_KEY_ID, "bottom", canvas.width / 2, canvas.height * 0.86, true);
        kBottom.lastFire = now;
        ships.set(BOTTOM_KEY_ID, kBottom);
      }

      function resetGame() {
        bullets.length = 0;
        explosions.length = 0;
        ships.clear();
        pointerToShip.clear();
        keyState.clear();
        teamLosses = { top: 0, bottom: 0 };
        gameOver = false;
        winnerText = "";
        lastTime = 0;
        replayButton.style.display = "none";
        resize();
        initKeyboardShips();
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        for (const ship of ships.values()) {
          ship.x = clampX(ship.x);
          ship.y = clampY(ship.y);
        }
      }

      function endGame(loserTeam) {
        gameOver = true;
        winnerText =
          loserTeam === "top" ? "Équipe du bas gagne !" : "Équipe du haut gagne !";
        replayButton.style.display = "block";
      }

      function destroyShip(ship, bulletColor, now) {
        ship.active = false;
        ship.heat = 0;
        ship.overheated = false;
        createExplosion(ship.x, ship.y, ship.color);
        playExplosion();
        triggerFlash(bulletColor, ship.color);

        teamLosses[ship.team] += 1;
        if (teamLosses[ship.team] >= MAX_LOSSES) {
          endGame(ship.team);
          return;
        }

        ship.respawnAt = now + RESPAWN_DELAY;
        if (ship.isKeyboard) {
          // Keyboard ships respawn at their default starting position
          ship.x = canvas.width / 2;
          ship.y = ship.team === "top" ? canvas.height * 0.14 : canvas.height * 0.86;
        } else {
          // Touch ships respawn at the last known finger position
          ship.x = clampX(ship.targetX);
          ship.y = clampY(ship.targetY);
        }
      }

      function fireBullet(ship, now) {
        ship.lastFire = now;

        // Default direction: straight toward the enemy half
        let vx = 0;
        let vy = teamDir(ship.team) * BULLET_SPEED;

        // Aim at the nearest active enemy ship instead
        let minDist = Infinity;
        for (const other of ships.values()) {
          if (other.team === ship.team || !other.active) continue;
          const dx = other.x - ship.x;
          const dy = other.y - ship.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < minDist) {
            minDist = dist;
            const len = dist || 1;
            vx = (dx / len) * BULLET_SPEED;
            vy = (dy / len) * BULLET_SPEED;
          }
        }

        bullets.push({
          x: ship.x,
          y: ship.y,
          vx,
          vy,
          color: ship.color,
          ownerTeam: ship.team,
        });

        ship.heat = Math.min(MAX_HEAT, ship.heat + SHOT_HEAT);
        if (ship.heat >= MAX_HEAT) ship.overheated = true;
        playShot();
      }

      function handleKeyboardMovement(dt) {
        const sec = dt / 1000;
        const kTop = ships.get(TOP_KEY_ID);
        const kBottom = ships.get(BOTTOM_KEY_ID);

        if (kTop && kTop.active) {
          const left = keyState.has("a") || keyState.has("q");
          const right = keyState.has("d");
          const up = keyState.has("w") || keyState.has("z");
          const down = keyState.has("s");
          if (left && !right) kTop.x -= MOVE_SPEED * sec;
          if (right && !left) kTop.x += MOVE_SPEED * sec;
          if (up && !down) kTop.y -= MOVE_SPEED * sec;
          if (down && !up) kTop.y += MOVE_SPEED * sec;
          kTop.x = clampX(kTop.x);
          kTop.y = clampY(kTop.y);
        }

        if (kBottom && kBottom.active) {
          const left = keyState.has("arrowleft");
          const right = keyState.has("arrowright");
          const up = keyState.has("arrowup");
          const down = keyState.has("arrowdown");
          if (left && !right) kBottom.x -= MOVE_SPEED * sec;
          if (right && !left) kBottom.x += MOVE_SPEED * sec;
          if (up && !down) kBottom.y -= MOVE_SPEED * sec;
          if (down && !up) kBottom.y += MOVE_SPEED * sec;
          kBottom.x = clampX(kBottom.x);
          kBottom.y = clampY(kBottom.y);
        }
      }

      function update(dt) {
        const now = performance.now();
        const sec = dt / 1000;

        handleKeyboardMovement(dt);

        for (const ship of ships.values()) {
          ship.heat = Math.max(0, ship.heat - COOL_RATE * sec);
          if (ship.overheated && ship.heat <= HEAT_RECOVERY_LEVEL) ship.overheated = false;

          if (!ship.active && !gameOver && now >= ship.respawnAt) {
            ship.active = true;
            ship.lastFire = now;
            // Touch ships reappear at the current finger position
            if (!ship.isKeyboard) {
              ship.x = clampX(ship.targetX);
              ship.y = clampY(ship.targetY);
            }
          }

          if (!gameOver && ship.active && !ship.overheated && now - ship.lastFire >= FIRE_INTERVAL) {
            fireBullet(ship, now);
          }
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
          const bullet = bullets[i];
          bullet.x += bullet.vx * sec;
          bullet.y += bullet.vy * sec;

          if (
            bullet.x < -50 ||
            bullet.x > canvas.width + 50 ||
            bullet.y < -50 ||
            bullet.y > canvas.height + 50
          ) {
            bullets.splice(i, 1);
            continue;
          }

          let hit = false;
          for (const ship of ships.values()) {
            if (ship.team === bullet.ownerTeam || !ship.active) continue;
            const dx = bullet.x - ship.x;
            const dy = bullet.y - ship.y;
            if (Math.sqrt(dx * dx + dy * dy) < SHIP_HIT_RADIUS + BULLET_RADIUS) {
              destroyShip(ship, bullet.color, now);
              bullets.splice(i, 1);
              hit = true;
              break;
            }
          }
          if (hit) continue;
        }

        for (let e = explosions.length - 1; e >= 0; e--) {
          let alive = false;
          for (const p of explosions[e].particles) {
            p.x += p.vx * sec;
            p.y += p.vy * sec;
            p.vy += 180 * sec;
            p.life -= sec * 1.8;
            if (p.life > 0) alive = true;
          }
          if (!alive) explosions.splice(e, 1);
        }
      }

      function drawShip(x, y, color, direction, crossed = false, size = SHIP_SIZE) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x, y + direction * size);
        ctx.lineTo(x - size * 0.65, y - direction * size * 0.5);
        ctx.lineTo(x + size * 0.65, y - direction * size * 0.5);
        ctx.closePath();

        const gradient = ctx.createLinearGradient(x, y - size, x, y + size);
        gradient.addColorStop(0, "#ffffff");
        gradient.addColorStop(0.45, color);
        gradient.addColorStop(1, color + "88");
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.lineWidth = crossed ? 1.4 : 2;
        ctx.strokeStyle = "#ffffffcc";
        ctx.stroke();

        ctx.beginPath();
        ctx.ellipse(
          x,
          y - direction * size * 0.5,
          size * 0.22,
          size * 0.12,
          0,
          0,
          Math.PI * 2
        );
        ctx.fillStyle = "#ffffff66";
        ctx.fill();

        if (crossed) {
          ctx.strokeStyle = "#ff4b4b";
          ctx.lineWidth = Math.max(2, size * 0.15);
          ctx.beginPath();
          ctx.moveTo(x - size * 0.9, y - size * 0.9);
          ctx.lineTo(x + size * 0.9, y + size * 0.9);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawTeamLossIcons(team, anchorY) {
        const iconSize = 10;
        const gap = 28;
        const startX = canvas.width - 26;
        const losses = teamLosses[team];
        for (let i = 0; i < losses; i++) {
          const y = anchorY + (team === "top" ? i * gap : -i * gap);
          drawShip(startX, y, team === "top" ? TOP_COLOR : BOTTOM_COLOR, teamDir(team), true, iconSize);
        }
      }

      function drawHud() {
        ctx.save();
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "left";
        ctx.fillStyle = TOP_COLOR;
        ctx.fillText(
          `Équipe haut — vies perdues : ${teamLosses.top}/${MAX_LOSSES}`,
          18,
          24
        );
        ctx.fillStyle = BOTTOM_COLOR;
        ctx.fillText(
          `Équipe bas — vies perdues : ${teamLosses.bottom}/${MAX_LOSSES}`,
          18,
          canvas.height - 24
        );
        ctx.restore();

        drawTeamLossIcons("top", 36);
        drawTeamLossIcons("bottom", canvas.height - 36);

        // Center dividing line (decorative — ships may cross it freely)
        ctx.save();
        ctx.strokeStyle = "#ffffff22";
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(0, canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();
        ctx.restore();

        // Instructions near the center line
        ctx.save();
        ctx.fillStyle = "#f7e4d288";
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(
          "Haut : Q/A ← D → Z/W ↑ S ↓   |   Bas : ← → ↑ ↓   |   Toucher l'écran pour invoquer des vaisseaux",
          canvas.width / 2,
          canvas.height / 2 + 18
        );
        ctx.restore();
      }

      function drawGameOverOverlay() {
        if (!gameOver) return;
        ctx.save();
        ctx.fillStyle = "#00000088";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff2d6";
        ctx.textAlign = "center";
        ctx.font = "bold 34px Arial";
        ctx.fillText("Partie terminée", canvas.width / 2, canvas.height / 2 - 42);
        ctx.font = "bold 26px Arial";
        ctx.fillText(winnerText, canvas.width / 2, canvas.height / 2 - 4);
        ctx.font = "18px Arial";
        ctx.fillText(
          `${MAX_LOSSES} vies perdues : la guerre s'arrête.`,
          canvas.width / 2,
          canvas.height / 2 + 30
        );
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#2a1308");
        gradient.addColorStop(0.5, "#4b250f");
        gradient.addColorStop(1, "#251106");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ffffff08";
        ctx.fillRect(0, 0, canvas.width, canvas.height / 2);
        ctx.fillStyle = "#00000010";
        ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

        for (const ship of ships.values()) {
          if (!ship.active) continue;
          ctx.save();
          if (ship.overheated) ctx.globalAlpha = 0.45;
          drawShip(ship.x, ship.y, ship.color, teamDir(ship.team));
          ctx.restore();
        }

        for (const bullet of bullets) {
          ctx.save();
          ctx.beginPath();
          ctx.arc(bullet.x, bullet.y, BULLET_RADIUS, 0, Math.PI * 2);
          ctx.fillStyle = bullet.color;
          ctx.shadowColor = bullet.color;
          ctx.shadowBlur = 14;
          ctx.fill();
          ctx.restore();
        }

        for (const exp of explosions) {
          for (const p of exp.particles) {
            if (p.life <= 0) continue;
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.restore();
          }
        }

        drawHud();
        drawGameOverOverlay();
      }

      function gameLoop(timestamp) {
        const dt = lastTime ? Math.min(timestamp - lastTime, 100) : 16;
        lastTime = timestamp;
        update(dt);
        draw();
        requestAnimationFrame(gameLoop);
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        unlockAudio();
        if (gameOver) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        // Assign team based on where the finger first touches
        const team = y < canvas.height / 2 ? "top" : "bottom";
        const shipId = `touch_${e.pointerId}`;
        if (ships.has(shipId)) return;
        const ship = createShip(shipId, team, x, y, false);
        ship.lastFire = performance.now();
        ships.set(shipId, ship);
        pointerToShip.set(e.pointerId, shipId);
        canvas.setPointerCapture(e.pointerId);
      });

      canvas.addEventListener("pointermove", (e) => {
        e.preventDefault();
        const shipId = pointerToShip.get(e.pointerId);
        if (!shipId) return;
        const ship = ships.get(shipId);
        if (!ship) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        // Always update target so respawn lands at current finger position
        ship.targetX = x;
        ship.targetY = y;
        if (ship.active) {
          ship.x = clampX(x);
          ship.y = clampY(y);
        }
      });

      function releasePointer(e) {
        const shipId = pointerToShip.get(e.pointerId);
        if (shipId) {
          ships.delete(shipId);
          pointerToShip.delete(e.pointerId);
        }
      }

      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);

      window.addEventListener("keydown", (e) => {
        unlockAudio();
        keyState.add(e.key.toLowerCase());
      });

      window.addEventListener("keyup", (e) => {
        keyState.delete(e.key.toLowerCase());
      });

      replayButton.addEventListener("click", () => {
        resetGame();
      });

      window.addEventListener("resize", resize);

      resetGame();
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
