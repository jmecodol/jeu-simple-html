<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeu Simple</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #2b1a0e;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100dvh;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
      h1 {
        color: #d4a07a;
        font-size: 1.2rem;
        padding: 8px 16px;
        flex-shrink: 0;
      }
      canvas {
        display: block;
        width: 100%;
        flex: 1;
        touch-action: none;
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <h1>Jeu Simple</h1>
    <canvas id="gameCanvas"></canvas>
    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const pastelColors = [
        "#FFB3C6", "#FFD6E0", "#FFC8A2", "#FFE0B2",
        "#D4F1C4", "#B5EAD7", "#C7CEEA", "#E2CCFF",
        "#FFDAC1", "#FF9AA2", "#B5D5F5", "#FFEAA7",
      ];

      // Active bubbles keyed by pointer/touch identifier
      const bubbles = new Map();

      // Track pairs currently touching (to fire thunder only on new contact)
      const touchingPairs = new Set();

      // --- Flash overlay for epileptic background effect on thunder ---
      const flashOverlay = document.createElement("div");
      flashOverlay.style.cssText =
        "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;z-index:10;";
      document.body.appendChild(flashOverlay);

      function blendColors(hex1, hex2) {
        const r = Math.round((parseInt(hex1.slice(1, 3), 16) + parseInt(hex2.slice(1, 3), 16)) / 2);
        const g = Math.round((parseInt(hex1.slice(3, 5), 16) + parseInt(hex2.slice(3, 5), 16)) / 2);
        const b = Math.round((parseInt(hex1.slice(5, 7), 16) + parseInt(hex2.slice(5, 7), 16)) / 2);
        return `rgb(${r},${g},${b})`;
      }

      let flashTimeout = null;

      function triggerFlash(color1, color2) {
        if (flashTimeout) clearTimeout(flashTimeout);
        flashOverlay.style.backgroundColor = blendColors(color1, color2);
        let count = 0;
        const totalFlashes = 4;   // 4 bright flashes
        const halfInterval = 6;   // 6 ms per half-cycle → 8 × 6 ms ≈ 48 ms total

        function step() {
          if (count >= totalFlashes * 2) {
            flashOverlay.style.opacity = "0";
            flashTimeout = null;
            return;
          }
          flashOverlay.style.opacity = count % 2 === 0 ? "0.9" : "0";
          count++;
          flashTimeout = setTimeout(step, halfInterval);
        }
        step();
      }

      // --- Thunder sound via Web Audio API ---
      let audioCtx = null;
      function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }

      function playThunder() {
        try {
          const ac = getAudioCtx();
          const bufferSize = ac.sampleRate * 1.5;
          const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
          const data = buffer.getChannelData(0);
          // White noise shaped into a thunder rumble
          for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 0.4);
          }
          const source = ac.createBufferSource();
          source.buffer = buffer;

          // Low-pass filter for rumble
          const filter = ac.createBiquadFilter();
          filter.type = "lowpass";
          filter.frequency.setValueAtTime(300, ac.currentTime);
          filter.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 1.5);

          const gain = ac.createGain();
          gain.gain.setValueAtTime(1.2, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 1.5);

          source.connect(filter);
          filter.connect(gain);
          gain.connect(ac.destination);
          source.start();
        } catch (e) {
          // AudioContext unavailable – silently skip
        }
      }

      // Draw a jagged lightning bolt between two points
      function drawLightning(x1, y1, x2, y2) {
        const segments = 8;
        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.sqrt(dx * dx + dy * dy);
        const nx = -dy / len; // normal direction
        const ny = dx / len;
        const jitter = len * 0.18;

        const pts = [{ x: x1, y: y1 }];
        for (let i = 1; i < segments; i++) {
          const t = i / segments;
          const offset = (Math.random() - 0.5) * 2 * jitter;
          pts.push({
            x: x1 + dx * t + nx * offset,
            y: y1 + dy * t + ny * offset,
          });
        }
        pts.push({ x: x2, y: y2 });

        // Glow layer
        ctx.save();
        ctx.shadowColor = "#ffffaa";
        ctx.shadowBlur = 18;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 3;
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();

        // Core bright line
        ctx.shadowBlur = 6;
        ctx.strokeStyle = "#ffe94d";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();
        ctx.restore();
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        draw();
      }

      function pickColor(id) {
        return pastelColors[Math.abs(id) % pastelColors.length];
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Dark brown background
        ctx.fillStyle = "#3b1f0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Collision detection & lightning
        const ids = [...bubbles.keys()];
        const nowTouching = new Set();
        for (let i = 0; i < ids.length; i++) {
          for (let j = i + 1; j < ids.length; j++) {
            const a = bubbles.get(ids[i]);
            const b = bubbles.get(ids[j]);
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist <= a.r + b.r) {
              const pairKey = ids[i] + ":" + ids[j];
              nowTouching.add(pairKey);
              // Play thunder and flash only when the pair first touches
              if (!touchingPairs.has(pairKey)) {
                playThunder();
                triggerFlash(a.color, b.color);
              }
              // Draw lightning bolt along the contact line
              const t = a.r / dist;
              drawLightning(
                a.x + dx * t, a.y + dy * t,
                b.x - dx * (b.r / dist), b.y - dy * (b.r / dist)
              );
            }
          }
        }
        // Update touching set
        touchingPairs.clear();
        for (const k of nowTouching) touchingPairs.add(k);

        for (const bubble of bubbles.values()) {
          const gradient = ctx.createRadialGradient(
            bubble.x - bubble.r * 0.3, bubble.y - bubble.r * 0.3, bubble.r * 0.1,
            bubble.x, bubble.y, bubble.r
          );
          gradient.addColorStop(0, "#ffffff");
          gradient.addColorStop(0.3, bubble.color);
          gradient.addColorStop(1, bubble.color + "88");
          ctx.beginPath();
          ctx.arc(bubble.x, bubble.y, bubble.r, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.fill();
        }
      }

      // --- Pointer Events (covers mouse + touch on modern browsers) ---
      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        bubbles.set(e.pointerId, {
          x: (e.clientX - rect.left) * scaleX,
          y: (e.clientY - rect.top) * scaleY,
          r: 52,
          color: pickColor(e.pointerId),
        });
        canvas.setPointerCapture(e.pointerId);
        draw();
      });

      canvas.addEventListener("pointermove", (e) => {
        e.preventDefault();
        if (!bubbles.has(e.pointerId)) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const b = bubbles.get(e.pointerId);
        b.x = (e.clientX - rect.left) * scaleX;
        b.y = (e.clientY - rect.top) * scaleY;
        draw();
      });

      canvas.addEventListener("pointerup", (e) => {
        e.preventDefault();
        bubbles.delete(e.pointerId);
        draw();
      });

      canvas.addEventListener("pointercancel", (e) => {
        bubbles.delete(e.pointerId);
        draw();
      });

      window.addEventListener("resize", resize);
      resize();
    </script>
  </body>
</html>
